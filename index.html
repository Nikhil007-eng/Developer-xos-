<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOS - Mobile Secure</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&family=Orbitron:wght@500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #3b82f6;
            --glass: rgba(8, 8, 10, 0.85);
            --border: rgba(255, 255, 255, 0.08);
        }

        /* Prevent Zoom and Scrolling */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed; /* Fixes position to prevent bounce scrolling */
            background-color: #050505;
            touch-action: none; /* Disables all touch gestures like pinch-zoom */
        }

        body {
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-brand { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .font-mono { font-family: 'Fira Code', monospace; }

        /* Background Visuals */
        .system-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .blob {
            position: absolute;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.25;
            border-radius: 50%;
        }

        /* View State Management */
        .view {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            height: 100dvh;
        }

        .view.active { display: flex; animation: viewIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @keyframes viewIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        /* UI Elements */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
        }

        .board-container {
            border-radius: 24px;
            width: 100%;
            max-width: 360px; /* Optimal for mobile width */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3a8a, var(--accent));
            width: 0%;
            transition: width 3.5s linear;
        }

        /* Profile Selection */
        .scroll-area {
            width: 100%;
            max-width: 380px;
            overflow-y: auto; /* Allow internal scrolling if many profiles */
            max-height: 70vh;
            padding: 5px;
            touch-action: pan-y; /* Allow vertical scroll only here */
        }
        
        .profile-item {
            transition: transform 0.2s ease;
        }
        .profile-item:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="system-bg"></div>
    <div class="blob w-64 h-64 bg-blue-900 -top-20 -left-20"></div>
    <div class="blob w-64 h-64 bg-purple-900 -bottom-20 -right-20"></div>

    <div id="view-welcome" class="view active">
        <div class="flex flex-col items-center text-center w-full">
            <div class="mb-8 relative">
                <div class="absolute inset-0 bg-blue-500 rounded-full blur-xl opacity-20"></div>
                <div class="relative w-24 h-24 rounded-full bg-black border border-gray-800 flex items-center justify-center">
                    <span class="font-brand text-5xl font-bold text-white">X</span>
                </div>
            </div>
            <h1 class="font-brand text-4xl mb-2 text-white">XOS</h1>
            <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase mb-12">Social Interface v1.0</p>
            
            <button onclick="enterSystem()" class="glass-panel w-full max-w-[280px] py-4 rounded-xl text-white font-medium tracking-widest uppercase text-sm active:scale-95 transition-transform">
                Enter System
            </button>

            <a href="https://nikhil007-eng.github.io/xos-social-Id/" target="_blank" class="mt-12 text-gray-600 text-[9px] uppercase tracking-[0.3em]">
                Developer
            </a>
        </div>
    </div>

    <div id="view-initializing" class="view">
        <div class="board-container glass-panel overflow-hidden">
            <div class="p-6 border-b border-white/[0.04]">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="h-1.5 w-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                        <span class="text-[8px] font-mono text-blue-400 tracking-[0.3em] uppercase">Syncing</span>
                    </div>
                    <span class="text-[8px] font-mono text-gray-600">v2.0.26</span>
                </div>
                <h1 class="font-brand text-3xl font-bold tracking-tighter">XOS <span class="text-blue-500">INT</span></h1>
            </div>
            <div class="p-6">
                <div class="space-y-4">
                    <div class="flex justify-between font-mono text-[9px] text-gray-500 uppercase">
                        <span>Modules</span>
                        <span class="text-blue-400" id="sync-percent">0%</span>
                    </div>
                    <div class="w-full h-[2px] bg-white/5 rounded-full">
                        <div id="sync-bar" class="progress-fill"></div>
                    </div>
                </div>
                <p class="mt-8 text-[9px] text-gray-600 italic">"Tailoring digital experience..."</p>
            </div>
        </div>
    </div>

    <div id="view-profiles" class="view">
        <div class="w-full max-w-md flex flex-col h-full pt-6">
            <div class="flex items-center justify-between mb-6 px-2">
                <h1 class="font-brand text-2xl font-bold text-white">XOS</h1>
                <i class="fas fa-cog text-gray-500"></i>
            </div>
            
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="text" placeholder="Search..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/5 border border-white/10 text-sm outline-none text-white font-brand">
            </div>

            <p class="text-[9px] uppercase text-gray-600 tracking-[0.2em] mb-4 px-2">Select User</p>
            
            <div class="scroll-area flex flex-col gap-3">
                <a href="index (6) (27).html" class="profile-item glass-panel rounded-2xl p-4 flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-500 p-[1px]">
                        <img src="nikprof.jpeg" class="w-full h-full rounded-full object-cover bg-black">
                    </div>
                    <div class="flex-1">
                        <h3 class="font-brand text-md text-white">Nikhil</h3>
                        <p class="text-[8px] text-gray-500 uppercase">Admin</p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
                </a>

                <a href="index (6) (27).html" class="profile-item glass-panel rounded-2xl p-4 flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 p-[1px]">
                        <img src="Screenshot_20260215-094025 (1).png" class="w-full h-full rounded-full object-cover bg-black">
                    </div>
                    <div class="flex-1">
                        <h3 class="font-brand text-md text-white">Anush</h3>
                        <p class="text-[8px] text-gray-500 uppercase">Member</p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
                </a>
            </div>

            <div class="mt-auto pb-10 text-center">
                <p class="text-[8px] text-gray-800 font-mono tracking-widest">SECURE ACCESS ONLY</p>
            </div>
        </div>
    </div>

    <audio id="systemAudio">
        <source src="shubh_tts_audio (2) (1).mp3" type="audio/mpeg">
    </audio>

    <script>
        function enterSystem() {
            const audio = document.getElementById('systemAudio');
            audio.play().catch(() => {});

            switchView('view-welcome', 'view-initializing');

            setTimeout(() => {
                const bar = document.getElementById('sync-bar');
                const percentText = document.getElementById('sync-percent');
                bar.style.width = '100%';
                
                let count = 0;
                let interval = setInterval(() => {
                    count++;
                    percentText.innerText = count + '%';
                    if(count >= 100) clearInterval(interval);
                }, 30);
            }, 100);

            setTimeout(() => {
                switchView('view-initializing', 'view-profiles');
            }, 4500);
        }

        function switchView(oldId, newId) {
            const oldView = document.getElementById(oldId);
            const newView = document.getElementById(newId);
            
            oldView.style.opacity = '0';
            setTimeout(() => {
                oldView.classList.remove('active');
                newView.classList.add('active');
            }, 600);
        }
    </script>
</body>
</html>
