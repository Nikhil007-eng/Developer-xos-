<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOS - Mobile Secure</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&family=Orbitron:wght@500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #3b82f6;
            --glass: rgba(8, 8, 10, 0.85);
            --border: rgba(255, 255, 255, 0.08);
        }

        /* Prevent Zoom and Scrolling */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            background-color: #030303; /* Pure clean dark base */
            touch-action: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-brand { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .font-mono { font-family: 'Fira Code', monospace; }

        /* Glowing Blobs for Depth (Grid removed) */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.2;
            border-radius: 50%;
        }

        /* View State Management */
        .view {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            height: 100dvh;
        }

        .view.active { display: flex; animation: viewIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @keyframes viewIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        /* UI Elements */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
        }

        .board-container {
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3a8a, var(--accent));
            width: 0%;
            transition: width 3.5s linear;
        }

        .scroll-area {
            width: 100%;
            max-width: 380px;
            overflow-y: auto;
            max-height: 70vh;
            padding: 5px;
            touch-action: pan-y;
        }
        
        .profile-item {
            transition: transform 0.2s ease;
        }
        .profile-item:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }

        .dev-highlight {
            margin-top: 3rem;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            text-transform: uppercase;
            font-size: 9px;
            letter-spacing: 0.3em;
            color: #60a5fa;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
            animation: devPulse 3s infinite ease-in-out;
            text-decoration: none;
        }

        @keyframes devPulse {
            0%, 100% { border-color: rgba(59, 130, 246, 0.2); box-shadow: 0 0 10px rgba(59, 130, 246, 0.05); opacity: 0.6; }
            50% { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); opacity: 1; }
        }

        /* PHOTO MODAL */
        #photo-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-content {
            width: 80vw;
            height: 80vw;
            max-width: 320px;
            max-height: 320px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px var(--accent);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .close-btn {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 110;
        }

        #photo-modal.active { display: flex; opacity: 1; }
        #photo-modal.active .modal-content { transform: scale(1); }

        .dev-note {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 1.5rem;
            text-align: center;
        }

        .dev-link {
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 8px;
        }
        .dev-link:hover { opacity: 1; letter-spacing: 3.5px; }
    </style>
</head>
<body>

    <div id="photo-modal" onclick="closePhoto()">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closePhoto()">
                <i class="fas fa-times"></i>
            </div>
            <div class="modal-content">
                <img id="zoomed-img" src="" alt="Zoomed Profile">
            </div>
        </div>
    </div>

    <div class="blob w-96 h-96 bg-blue-900 -top-20 -left-20"></div>
    <div class="blob w-80 h-80 bg-purple-900 -bottom-20 -right-20"></div>

    <div id="view-welcome" class="view active">
        <div class="flex flex-col items-center text-center w-full">
            <div class="mb-8 relative">
                <div class="absolute inset-0 bg-blue-500 rounded-full blur-xl opacity-20"></div>
                <div class="relative w-24 h-24 rounded-full bg-black border border-gray-800 flex items-center justify-center">
                    <span class="font-brand text-5xl font-bold text-white">X</span>
                </div>
            </div>
            <h1 class="font-brand text-4xl mb-2 text-white">XOS</h1>
            <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase mb-12">Social Interface v1.0</p>
            
            <button onclick="enterSystem()" class="glass-panel w-full max-w-[280px] py-4 rounded-xl text-white font-medium tracking-widest uppercase text-sm active:scale-95 transition-transform">
                Enter System
            </button>

            <a href="https://nikhil007-eng.github.io/xos-social-Id/" target="_blank" class="dev-highlight">
                Developer
            </a>
        </div>
    </div>

    <div id="view-initializing" class="view">
        <div class="board-container glass-panel overflow-hidden">
            <div class="p-6 border-b border-white/[0.04]">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="h-1.5 w-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                        <span class="text-[8px] font-mono text-blue-400 tracking-[0.3em] uppercase">Syncing</span>
                    </div>
                    <span class="text-[8px] font-mono text-gray-600">v2.0.26</span>
                </div>
                <h1 class="font-brand text-3xl font-bold tracking-tighter">XOS <span class="text-blue-500">INT</span></h1>
            </div>
            <div class="p-6">
                <div class="space-y-4">
                    <div class="flex justify-between font-mono text-[9px] text-gray-500 uppercase">
                        <span>Modules</span>
                        <span class="text-blue-400" id="sync-percent">0%</span>
                    </div>
                    <div class="w-full h-[2px] bg-white/5 rounded-full">
                        <div id="sync-bar" class="progress-fill"></div>
                    </div>
                </div>
                <p class="mt-8 text-[9px] text-gray-600 italic">"Tailoring digital experience..."</p>
            </div>
        </div>
    </div>

    <div id="view-profiles" class="view">
        <div class="w-full max-w-md flex flex-col h-full pt-6">
            <div class="flex items-center justify-between mb-6 px-2">
                <h1 class="font-brand text-2xl font-bold text-white">XOS</h1>
                <i class="fas fa-cog text-gray-500"></i>
            </div>
            
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="text" placeholder="Search..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/5 border border-white/10 text-sm outline-none text-white font-brand">
            </div>

            <p class="text-[9px] uppercase text-gray-600 tracking-[0.2em] mb-4 px-2">Select User</p>
            
            <div class="scroll-area flex flex-col gap-3">
                <div class="profile-item glass-panel rounded-2xl p-4 flex items-center gap-4">
                    <div onclick="zoomPhoto('file_00000000f4f47208a731ff7b47a3b568.png')" class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-500 p-[1px] cursor-pointer">
                        <img src="file_00000000f4f47208a731ff7b47a3b568.png" class="w-full h-full rounded-full object-cover bg-black">
                    </div>
                    <a href="index (6) (27).html" class="flex-1">
                        <h3 class="font-brand text-md text-white">Nikhil</h3>
                        <p class="text-[8px] text-gray-500 uppercase">Admin</p>
                    </a>
                    <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
                </div>

                <div class="profile-item glass-panel rounded-2xl p-4 flex items-center gap-4">
                    <div onclick="zoomPhoto('Screenshot_20260221-160725.png')" class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 p-[1px] cursor-pointer">
                        <img src="Screenshot_20260221-160725.png" class="w-full h-full rounded-full object-cover bg-black">
                    </div>
                    <a href="index (6) (27).html" class="flex-1">
                        <h3 class="font-brand text-md text-white">Anush</h3>
                        <p class="text-[8px] text-gray-500 uppercase">Member</p>
                    </a>
                    <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
                </div>

                <div class="mt-6 flex flex-col items-center">
                    <p class="dev-note">to add your profile contact developer(not for everyone)</p>
                    <a href="https://nikhil007-eng.github.io/xos-social-Id/" target="_blank" class="dev-link">Contact Developer</a>
                </div>
            </div>

            <div class="mt-auto pb-6 text-center">
                <p class="text-[8px] text-gray-800 font-mono tracking-widest">SECURE ACCESS ONLY</p>
            </div>
        </div>
    </div>

    <audio id="systemAudio">
        <source src="shubh_tts_audio (2) (1).mp3" type="audio/mpeg">
    </audio>

    <script>
        function zoomPhoto(src) {
            const modal = document.getElementById('photo-modal');
            const img = document.getElementById('zoomed-img');
            img.src = src;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closePhoto() {
            const modal = document.getElementById('photo-modal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function enterSystem() {
            const audio = document.getElementById('systemAudio');
            audio.play().catch(() => {});
            switchView('view-welcome', 'view-initializing');
            setTimeout(() => {
                const bar = document.getElementById('sync-bar');
                const percentText = document.getElementById('sync-percent');
                bar.style.width = '100%';
                let count = 0;
                let interval = setInterval(() => {
                    count++;
                    percentText.innerText = count + '%';
                    if(count >= 100) clearInterval(interval);
                }, 30);
            }, 100);
            setTimeout(() => {
                switchView('view-initializing', 'view-profiles');
            }, 4500);
        }

        function switchView(oldId, newId) {
            const oldView = document.getElementById(oldId);
            const newView = document.getElementById(newId);
            oldView.style.opacity = '0';
            setTimeout(() => {
                oldView.classList.remove('active');
                newView.classList.add('active');
            }, 600);
        }
    </script>
</body>
</html>
