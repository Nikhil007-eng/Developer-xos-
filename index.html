<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOS - Mobile Secure</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&family=Orbitron:wght@500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #3b82f6;
            /* SEAMLESS BLEND: Lower opacity alpha for deeper integration with black */
            --glass: rgba(15, 15, 20, 0.4); 
            --border: rgba(255, 255, 255, 0.08);
            --bg-color: #000000; /* Pure AMOLED Black */
            --text-color: #ffffff;
        }

        body.light-mode {
            --glass: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1);
            --bg-color: #f0f2f5;
            --text-color: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            background-color: var(--bg-color) !important;
            transition: background-color 0.4s ease;
            touch-action: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-brand { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .font-mono { font-family: 'Fira Code', monospace; }

        .view {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            height: 100dvh;
        }

        .view.active { display: flex; animation: viewIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @keyframes viewIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .glass-panel {
            background: var(--glass);
            /* ENHANCED BLUR: Deeper saturation and higher blur for seamless look */
            backdrop-filter: blur(45px) saturate(210%);
            -webkit-backdrop-filter: blur(45px) saturate(210%);
            border: 1px solid var(--border);
            color: var(--text-color);
        }

        .board-container {
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3a8a, var(--accent));
            width: 0%;
            transition: width 3.5s linear;
        }

        .scroll-area {
            width: 100%;
            max-width: 380px;
            overflow-y: auto;
            max-height: 70vh;
            padding: 5px;
            touch-action: pan-y;
        }
        
        .profile-item {
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .profile-item:active { transform: scale(0.97); background: rgba(255,255,255,0.05); }

        .red-tick-glow {
            color: #ff3131;
            text-shadow: 0 0 8px rgba(255, 49, 49, 0.6);
            animation: adminTickPulse 2s infinite ease-in-out;
        }

        @keyframes adminTickPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); filter: drop-shadow(0 0 2px rgba(255,49,49,0.4)); }
            50% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(255,49,49,0.8)); }
        }

        .dev-highlight {
            margin-top: 3rem;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            text-transform: uppercase;
            font-size: 9px;
            letter-spacing: 0.3em;
            color: #60a5fa;
            animation: devPulse 3s infinite ease-in-out;
            text-decoration: none;
        }

        @keyframes devPulse {
            0%, 100% { border-color: rgba(59, 130, 246, 0.2); opacity: 0.6; }
            50% { border-color: rgba(59, 130, 246, 0.5); opacity: 1; }
        }

        /* MODALS */
        #photo-modal, #settings-modal {
            position: fixed;
            inset: 0;
            background: #000000; /* Flat Black Overlay */
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-content {
            width: 80vw;
            height: 80vw;
            max-width: 320px;
            max-height: 320px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .settings-box {
            width: 85vw;
            max-width: 320px;
            padding: 30px;
            border-radius: 28px;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 110;
        }

        #photo-modal.active, #settings-modal.active { display: flex; opacity: 1; }
        #photo-modal.active .modal-content, #settings-modal.active .settings-box { transform: scale(1); }

        /* TOGGLE SWITCH */
        .switch {
            position: relative;
            display: inline-block;
            width: 45px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(21px); }

        .dev-note { font-size: 9px; color: rgba(255, 255, 255, 0.3); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 1.5rem; text-align: center; }
        .dev-link { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; transition: all 0.3s ease; text-decoration: none; display: inline-block; margin-top: 8px; }
        .dev-link:hover { opacity: 1; letter-spacing: 3.5px; }
    </style>
</head>
<body>

    <div id="settings-modal" onclick="backToProfile()">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="settings-box glass-panel text-center">
                <div class="close-btn" onclick="backToProfile()"><i class="fas fa-times"></i></div>
                <h2 class="font-brand text-xl mb-6 mt-4 uppercase tracking-widest">Settings</h2>
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                    <span class="text-xs font-brand uppercase opacity-70">Dark Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle" checked onclick="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
                <p class="mt-6 text-[8px] font-mono text-gray-500 uppercase tracking-widest">XOS v1.0.0 Global Control</p>
            </div>
        </div>
    </div>

    <div id="photo-modal" onclick="closePhoto()">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closePhoto()"><i class="fas fa-times"></i></div>
            <div class="modal-content"><img id="zoomed-img" src="" alt="Zoomed Profile"></div>
        </div>
    </div>

    <div id="view-welcome" class="view active">
        <div class="flex flex-col items-center text-center w-full">
            <div class="mb-8 relative">
                <div class="relative w-24 h-24 rounded-full bg-black border border-gray-800 flex items-center justify-center">
                    <span class="font-brand text-5xl font-bold text-white">X</span>
                </div>
            </div>
            <h1 class="font-brand text-4xl mb-2">XOS</h1>
            <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase mb-12">Social Interface v1.0</p>
            <button onclick="enterSystem()" class="glass-panel w-full max-w-[280px] py-4 rounded-xl font-medium tracking-widest uppercase text-sm active:scale-95 transition-transform">Enter System</button>
            <a href="https://nikhil007-eng.github.io/xos-social-Id/" target="_blank" class="dev-highlight">Developer</a>
        </div>
    </div>

    <div id="view-initializing" class="view">
        <div class="board-container glass-panel overflow-hidden">
            <div class="p-6 border-b border-white/[0.04]">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="h-1.5 w-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                        <span class="text-[8px] font-mono text-blue-400 tracking-[0.3em] uppercase">Syncing</span>
                    </div>
                    <span class="text-[8px] font-mono text-gray-600">v2.0.26</span>
                </div>
                <h1 class="font-brand text-3xl font-bold tracking-tighter">XOS <span class="text-blue-500">INT</span></h1>
            </div>
            <div class="p-6">
                <div class="space-y-4">
                    <div class="flex justify-between font-mono text-[9px] text-gray-500 uppercase">
                        <span>Modules</span>
                        <span class="text-blue-400" id="sync-percent">0%</span>
                    </div>
                    <div class="w-full h-[2px] bg-white/5 rounded-full">
                        <div id="sync-bar" class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-profiles" class="view">
        <div class="w-full max-w-md flex flex-col h-full pt-6">
            <div class="flex items-center justify-between mb-6 px-2">
                <h1 class="font-brand text-2xl font-bold">XOS</h1>
                <i class="fas fa-cog text-gray-500 cursor-pointer p-2 active:rotate-90 transition-transform" onclick="openSettings()"></i>
            </div>
            
            <div class="relative mb-6">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
                <input type="text" placeholder="Search..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/5 border border-white/10 text-sm outline-none font-brand">
            </div>

            <p class="text-[9px] uppercase text-gray-600 tracking-[0.2em] mb-4 px-2">Select User</p>
            
            <div class="scroll-area flex flex-col gap-3">
                <a href="Nikhilprof.html" class="profile-item glass-panel rounded-2xl p-4 flex items-center gap-4">
                    <div onclick="event.preventDefault(); zoomPhoto('file_00000000f4f47208a731ff7b47a3b568.png')" class="w-10 h-10 rounded-full bg-gradient-to-tr from-red-600 to-black p-[1px] cursor-pointer z-10">
                        <img src="file_00000000f4f47208a731ff7b47a3b568.png" class="w-full h-full rounded-full object-cover bg-black">
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-brand text-md">Nikhil</h3>
                            <i class="fas fa-check-circle red-tick-glow text-[11px]"></i>
                        </div>
                        <p class="text-[8px] text-gray-500 uppercase">Admin</p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
                </a>

                <a href="index (6) (27).html" class="profile-item glass-panel rounded-2xl p-4 flex items-center gap-4">
                    <div onclick="event.preventDefault(); zoomPhoto('Screenshot_20260221-160725.png')" class="w-10 h-10 rounded-full bg-gradient-to-tr from-green-600 to-black p-[1px] cursor-pointer z-10">
                        <img src="Screenshot_20260221-160725.png" class="w-full h-full rounded-full object-cover bg-black">
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-brand text-md">Anush</h3>
                            <i class="fas fa-check-circle text-green-500 text-[10px]"></i>
                        </div>
                        <p class="text-[8px] text-gray-500 uppercase">Member</p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
                </a>

                <a href="https://nikhil007-eng.github.io/xosintanush/" class="profile-item glass-panel rounded-2xl p-4 flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full border border-blue-500/30 flex items-center justify-center bg-black text-[10px] font-brand text-blue-400">XYZ</div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-brand text-md">XYZ</h3>
                            <i class="fas fa-check-circle text-blue-500 text-[10px]"></i>
                        </div>
                        <p class="text-[8px] text-gray-500 uppercase">member</p>
                    </div>
                    <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
                </a>

                <div class="mt-6 flex flex-col items-center">
                    <p class="dev-note">Contact developer to request profile</p>
                    <a href="https://forms.gle/9V3AJqTQBtLdiThi8" target="_blank" class="dev-link">Contact Developer</a>
                </div>
            </div>

            <div class="mt-auto pb-6 text-center">
                <p class="text-[8px] text-gray-800 font-mono tracking-widest">ENCRYPTED TERMINAL</p>
            </div>
        </div>
    </div>

    <audio id="systemAudio"><source src="shubh_tts_audio (2) (1).mp3" type="audio/mpeg"></audio>

    <script>
        function toggleTheme() {
            const isDark = document.getElementById('theme-toggle').checked;
            if (isDark) {
                document.body.classList.remove('light-mode');
            } else {
                document.body.classList.add('light-mode');
            }
        }

        function openSettings() {
            window.history.pushState({ modal: 'settings' }, '');
            const modal = document.getElementById('settings-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function backToProfile() {
            if(window.history.state && window.history.state.modal === 'settings') {
                window.history.back();
            } else {
                closeSettings();
            }
        }

        function closeSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        window.onpopstate = function(event) {
            closeSettings();
            closePhoto();
        };

        function zoomPhoto(src) {
            window.history.pushState({ modal: 'photo' }, '');
            const modal = document.getElementById('photo-modal');
            const img = document.getElementById('zoomed-img');
            img.src = src;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closePhoto() {
            const modal = document.getElementById('photo-modal');
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function enterSystem() {
            const audio = document.getElementById('systemAudio');
            audio.play().catch(() => {});
            switchView('view-welcome', 'view-initializing');
            setTimeout(() => {
                const bar = document.getElementById('sync-bar');
                const percentText = document.getElementById('sync-percent');
                bar.style.width = '100%';
                let count = 0;
                let interval = setInterval(() => {
                    count++;
                    percentText.innerText = count + '%';
                    if(count >= 100) clearInterval(interval);
                }, 30);
            }, 100);
            setTimeout(() => switchView('view-initializing', 'view-profiles'), 3000);
        }

        function switchView(oldId, newId) {
            const oldView = document.getElementById(oldId);
            const newView = document.getElementById(newId);
            oldView.style.opacity = '0';
            setTimeout(() => {
                oldView.classList.remove('active');
                newView.classList.add('active');
            }, 600);
        }
    </script>
</body>
