<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOS - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#007aff; --glass:rgba(10,10,10,0.85); --border:#1a1a1a; --bg-color:#000; --text-main:#fff; }
        * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        html,body { height:100%; width:100%; overflow:hidden; position:fixed; background-color:var(--bg-color); color:var(--text-main); font-family:'Space Grotesk',sans-serif; }
        .font-brand { font-family:'Space Grotesk',sans-serif; letter-spacing:2px; text-transform:uppercase; }
        .glass-panel { background:var(--glass); backdrop-filter:blur(25px) saturate(180%); -webkit-backdrop-filter:blur(25px) saturate(180%); border:1px solid var(--border); }
        .main-container { height:100dvh; overflow-y:auto; touch-action:pan-y; padding-bottom:100px; }
        .floating-modal { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.8); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); display:none; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s; }
        .floating-modal.active { display:flex; opacity:1; }
        .modal-box { width:85vw; max-width:400px; max-height:85vh; background:#000; border:1px solid var(--border); border-radius:32px; overflow:hidden; position:relative; transform:scale(0.9); transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
        .floating-modal.active .modal-box { transform:scale(1); }
        .close-btn-circle { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.1); color:white; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .edit-input { width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:14px; padding:12px 16px; color:#fff; font-size:12px; outline:none; }
        .edit-input:focus { border-color:var(--accent); }
        .edit-label { font-size:8px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:2px; margin-bottom:6px; display:block; }
        .upload-trigger { background:rgba(0,122,255,0.1); border:1px dashed var(--accent); color:var(--accent); padding:14px; border-radius:14px; text-align:center; font-size:10px; cursor:pointer; transition: 0.2s; }
        .upload-trigger:active { background:rgba(0,122,255,0.2); transform: scale(0.98); }
        .spinner { width:24px; height:24px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--accent); border-radius:50%; animation:rot 0.8s linear infinite; }
        @keyframes rot { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen" style="position:fixed;inset:0;background:#000;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div class="spinner"></div>
    <p class="font-brand" style="font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:4px;">SYNCING_XOS</p>
</div>

<div id="profile-root" style="display:none;"></div>
<audio id="bio-audio" loop preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>

let db = null;
try {
    firebase.initializeApp({
        apiKey:"AIzaSyAUk6bBCFPoq-Tu-AiX1nD3LFvhc6g7B7g",
        authDomain:"steel-melody-464711-d6.firebaseapp.com",
        databaseURL:"https://steel-melody-464711-d6-default-rtdb.firebaseio.com",
        projectId:"steel-melody-464711-d6",
        storageBucket:"steel-melody-464711-d6.firebasestorage.app",
        messagingSenderId:"288849938458",
        appId:"1:288849938458:web:d615242bb9f1e1ee0fe9a3"
    });
    db = firebase.database();
} catch(e) { console.error("Firebase Init Error"); }

const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('u') || '';
if (!userId) window.location.href = 'index.html';

// Initialize History state correctly for the base page
if (!history.state) {
    history.replaceState({ screen: 'profile_base' }, '', window.location.href);
}

function initProfile() {
    db.ref('profiles/' + userId).on('value', snap => {
        const p = snap.val();
        if (!p) { window.location.href = 'index.html'; return; }
        renderProfile(p);
    });
}
initProfile();

function renderProfile(p) {
    const name = p.name || userId;
    const nameLow = userId; // Always use the URL parameter for the path
    const photo = p.photo || '';
    const audio = p.audio || '';
    const songName = p.songName || 'System Track';
    const songLink = p.songLink || '';

    const bioAudio = document.getElementById('bio-audio');
    if (audio && bioAudio.src !== audio) bioAudio.src = audio;

    document.getElementById('profile-root').innerHTML = `
    <div id="menu-modal" class="floating-modal" onclick="handleExit()">
        <div class="modal-box p-8" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-10">
                <h3 class="font-brand text-[10px] text-blue-500 tracking-[0.4em]">SYSTEM</h3>
                <div class="close-btn-circle" onclick="handleExit()"><i class="fas fa-times text-xs"></i></div>
            </div>
            <div class="space-y-4">
                <button onclick="openEditAuth()" class="w-full glass-panel p-5 rounded-2xl flex items-center gap-4 active:scale-95 transition-all">
                    <i class="fas fa-fingerprint text-blue-500"></i>
                    <span class="text-xs font-brand tracking-widest">EDIT PROFILE</span>
                </button>
                <button onclick="navigator.share({url:window.location.href})" class="w-full glass-panel p-5 rounded-2xl flex items-center gap-4 active:scale-95 transition-all">
                    <i class="fas fa-share-nodes text-blue-500"></i>
                    <span class="text-xs font-brand tracking-widest">SHARE UPLINK</span>
                </button>
            </div>
        </div>
    </div>

    <div id="edit-auth-modal" class="floating-modal" onclick="handleExit()">
        <div class="modal-box p-8" onclick="event.stopPropagation()">
            <h3 class="font-brand text-[10px] text-blue-500 mb-8 tracking-[0.4em]">AUTHORIZE</h3>
            <input type="password" id="auth-code" class="edit-input mb-4" placeholder="••••••••">
            <button onclick="checkAuth('${nameLow}')" class="w-full bg-blue-600/20 border border-blue-500 text-blue-500 py-4 rounded-xl font-brand text-[10px] tracking-widest">VERIFY</button>
        </div>
    </div>

    <div id="edit-profile-modal" class="floating-modal" onclick="handleExit()">
        <div class="modal-box flex flex-col h-[85vh]" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-black">
                <h3 class="font-brand text-[10px] text-blue-500 tracking-[0.4em]">MOD_SYSTEM</h3>
                <div class="close-btn-circle" onclick="handleExit()"><i class="fas fa-times text-xs"></i></div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div><label class="edit-label">Display Name</label><input type="text" id="up-name" class="edit-input" value="${name}"></div>
                
                <div>
                    <label class="edit-label">Profile Identity</label>
                    <div class="upload-trigger" onclick="document.getElementById('in-photo').click()">
                        <i class="fas fa-image-portrait mr-2"></i>REPLACE_PHOTO
                    </div>
                    <input type="file" id="in-photo" class="hidden" accept="image/*" onchange="uploadFile(this, 'photo')">
                    <p id="st-photo" class="text-[8px] text-gray-600 mt-2 uppercase tracking-tighter"></p>
                </div>

                <div class="pt-4 border-t border-white/5">
                    <p class="text-[9px] text-blue-500/40 font-brand mb-4 tracking-[0.3em]">SOUNDSCAPE</p>
                    <div class="space-y-4">
                        <div>
                            <label class="edit-label">Bio Audio</label>
                            <div class="upload-trigger" onclick="document.getElementById('in-audio').click()">
                                <i class="fas fa-waveform-lines mr-2"></i>UPLOAD_SOUND
                            </div>
                            <input type="file" id="in-audio" class="hidden" accept="audio/*" onchange="uploadFile(this, 'audio')">
                            <p id="st-audio" class="text-[8px] text-gray-600 mt-2 uppercase tracking-tighter"></p>
                        </div>
                        <div><label class="edit-label">YouTube Music Link</label><input type="text" id="up-yt" class="edit-input" value="${songLink}"></div>
                    </div>
                </div>
            </div>
            <div class="p-6 bg-black border-t border-white/5">
                <button onclick="saveChanges()" class="w-full bg-blue-600 py-4 rounded-xl font-brand text-[10px] tracking-widest active:scale-95 transition-all">COMMIT_CHANGES</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="flex justify-between items-center px-6 py-8">
            <button onclick="history.back()" class="glass-panel w-10 h-10 rounded-full flex items-center justify-center text-gray-500 active:scale-90 transition-all"><i class="fas fa-chevron-left"></i></button>
            <span class="font-brand text-[9px] text-gray-500 tracking-[0.4em]">XOS // PROFILE</span>
            <button onclick="openModal('menu-modal')" class="glass-panel w-10 h-10 rounded-xl flex items-center justify-center text-white active:scale-90 transition-all"><i class="fas fa-bars-staggered"></i></button>
        </div>

        <div class="px-6 mb-10">
            <div class="glass-panel p-7 rounded-[36px] relative overflow-hidden">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 rounded-2xl overflow-hidden border border-white/5"><img src="${photo}" class="w-full h-full object-cover"></div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2"><h1 class="font-brand text-lg">${name}</h1><i class="fas fa-check-circle text-blue-500 text-[10px]"></i></div>
                        <p class="text-[10px] text-blue-500/50 font-mono tracking-tighter">${nameLow}@xos</p>
                        <div class="mt-3">
                            <div class="flex items-center gap-2">
                                <div onclick="toggleBio()" class="text-blue-500 text-[11px] cursor-pointer"><i class="fas fa-play" id="play-icon"></i></div>
                                ${songLink ? `<a href="${songLink}" target="_blank" class="text-[9px] font-brand tracking-[2px] text-gray-500 uppercase hover:text-blue-400"> ${songName}</a>` : `<span class="text-[9px] font-brand tracking-[2px] text-gray-600 uppercase">${songName}</span>`}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-6 grid grid-cols-2 gap-3" id="posts-grid"></div>
    </div>
    `;

    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('profile-root').style.display = 'block';
    
    loadPosts(nameLow);
}

// Logic Suite
let uploaded = { photo: null, audio: null };

function openModal(id) {
    history.pushState({ modal: id }, '', '');
    const m = document.getElementById(id);
    m.style.display = 'flex';
    setTimeout(() => m.classList.add('active'), 10);
}

function handleExit() { history.back(); }

window.onpopstate = (e) => {
    document.querySelectorAll('.floating-modal').forEach(m => {
        m.classList.remove('active');
        setTimeout(() => m.style.display = 'none', 300);
    });
    // Natural browser behavior handles the "back to where it came from" for profile_base
};

function toggleBio() {
    const a = document.getElementById('bio-audio');
    const i = document.getElementById('play-icon');
    if (a.paused) { a.play(); i.className = 'fas fa-pause'; }
    else { a.pause(); i.className = 'fas fa-play'; }
}

function openEditAuth() {
    document.getElementById('menu-modal').classList.remove('active');
    setTimeout(() => {
        document.getElementById('menu-modal').style.display = 'none';
        openModal('edit-auth-modal');
    }, 300);
}

function checkAuth(id) {
    if (document.getElementById('auth-code').value === id + '@432') {
        document.getElementById('edit-auth-modal').classList.remove('active');
        setTimeout(() => {
            document.getElementById('edit-auth-modal').style.display = 'none';
            openModal('edit-profile-modal');
        }, 300);
    } else alert('UNAUTHORIZED');
}

async function uploadFile(input, type) {
    if (!input.files[0]) return;
    const st = document.getElementById(`st-${type}`);
    st.textContent = "UPLOADING...";
    const fd = new FormData();
    fd.append('file', input.files[0]);
    fd.append('upload_preset', 'vagprxhr');
    try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/dptphdatf/${type==='audio'?'video':'image'}/upload`, { method:'POST', body:fd });
        const d = await res.json();
        uploaded[type] = d.secure_url;
        st.textContent = "✓ READY";
        st.style.color = "var(--accent)";
    } catch(e) { st.textContent = "ERROR"; }
}

function saveChanges() {
    const yt = document.getElementById('up-yt').value;
    let sName = document.getElementById('up-name').value + "'s Anthem";
    if (yt.includes('music.youtube.com')) {
        const id = yt.split('v=')[1]?.split('&')[0];
        sName = "YT_TRACK_" + (id ? id.substring(0,6) : "BIO");
    }
    
    const data = {
        name: document.getElementById('up-name').value,
        songLink: yt,
        songName: sName
    };
    if (uploaded.photo) data.photo = uploaded.photo;
    if (uploaded.audio) data.audio = uploaded.audio;

    db.ref('profiles/' + userId).update(data).then(() => history.back());
}

function loadPosts(id) {
    db.ref(id + '/posts').on('value', snap => {
        const posts = [];
        const data = snap.val();
        if (data) Object.entries(data).sort((a,b)=>b[1].timestamp-a[1].timestamp).forEach(([k,v])=>posts.push(v));
        document.getElementById('posts-grid').innerHTML = posts.map(p => `
            <div class="glass-panel aspect-square rounded-2xl overflow-hidden active:scale-95 transition-all">
                ${p.type==='video' ? `<video src="${p.src}" class="w-full h-full object-cover opacity-50"></video>` : `<img src="${p.src}" class="w-full h-full object-cover opacity-80">`}
            </div>
        `).join('') || '<div class="col-span-2 text-center py-20 opacity-10 text-[10px] tracking-widest">EMPTY_FEED</div>';
    });
}

</script>
</body>
</html>
