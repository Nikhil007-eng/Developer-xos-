<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOS - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#007aff; --glass:rgba(10,10,10,0.85); --border:#1a1a1a; --bg-color:#000; --text-main:#fff; }
        * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        html,body { height:100%; width:100%; overflow:hidden; position:fixed; background-color:var(--bg-color); color:var(--text-main); font-family:'Space Grotesk',sans-serif; }
        .font-brand { font-family:'Space Grotesk',sans-serif; letter-spacing:2px; text-transform:uppercase; }
        .glass-panel { background:var(--glass); backdrop-filter:blur(25px) saturate(180%); -webkit-backdrop-filter:blur(25px) saturate(180%); border:1px solid var(--border); }
        .main-container { height:100dvh; overflow-y:auto; touch-action:pan-y; padding-bottom:100px; }
        .floating-modal { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.8); backdrop-filter:blur(15px); display:none; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s; }
        .floating-modal.active { display:flex; opacity:1; }
        .modal-box { width:85vw; max-width:400px; background:#000; border:1px solid var(--border); border-radius:32px; overflow:hidden; transform:scale(0.9); transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
        .floating-modal.active .modal-box { transform:scale(1); }
        .edit-input { width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:14px; padding:12px 16px; color:#fff; font-size:12px; outline:none; }
        .upload-trigger { background:rgba(0,122,255,0.1); border:1px dashed var(--accent); color:var(--accent); padding:14px; border-radius:14px; text-align:center; font-size:10px; cursor:pointer; }
        .spinner { width:24px; height:24px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--accent); border-radius:50%; animation:rot 0.8s linear infinite; }
        @keyframes rot { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen" style="position:fixed;inset:0;background:#000;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div class="spinner"></div>
    <p id="loading-text" class="font-brand" style="font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:4px;">SYNCING_XOS</p>
</div>

<div id="profile-root" style="display:none;"></div>
<audio id="bio-audio" loop preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>

// --- FIREBASE INITIALIZATION ---
let db = null;
const firebaseConfig = {
    apiKey: "AIzaSyAUk6bBCFPoq-Tu-AiX1nD3LFvhc6g7B7g",
    authDomain: "steel-melody-464711-d6.firebaseapp.com",
    databaseURL: "https://steel-melody-464711-d6-default-rtdb.firebaseio.com",
    projectId: "steel-melody-464711-d6",
    storageBucket: "steel-melody-464711-d6.firebasestorage.app",
    messagingSenderId: "288849938458",
    appId: "1:288849938458:web:d615242bb9f1e1ee0fe9a3"
};

try {
    const app = firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch(e) {
    document.getElementById('loading-text').textContent = "CONFIG_ERROR";
}

// --- DATA FETCHING ---
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('u');

if (!userId) {
    window.location.href = 'index.html';
} else {
    // Start listener with error handling
    db.ref('profiles/' + userId).on('value', snap => {
        const p = snap.val();
        if (p) {
            renderProfile(p);
        } else {
            document.getElementById('loading-text').textContent = "USER_NOT_FOUND";
            setTimeout(() => window.location.href = 'index.html', 2000);
        }
    }, error => {
        document.getElementById('loading-text').textContent = "PERMISSION_DENIED";
        console.error(error);
    });
}

function renderProfile(p) {
    const name = p.name || "UNNAMED";
    const photo = p.photo || "";
    const audio = p.audio || "";
    const songName = p.songName || "XOS_SEQUENCE";
    const songLink = p.songLink || "";

    document.getElementById('bio-audio').src = audio;

    document.getElementById('profile-root').innerHTML = `
    <div id="menu-modal" class="floating-modal" onclick="handleExit()">
        <div class="modal-box p-8" onclick="event.stopPropagation()">
            <h3 class="font-brand text-[10px] text-blue-500 mb-8 tracking-[0.4em]">SYSTEM</h3>
            <div class="space-y-4">
                <button onclick="openEditAuth()" class="w-full glass-panel p-5 rounded-2xl flex items-center gap-4 active:scale-95 transition-all">
                    <i class="fas fa-fingerprint text-blue-500"></i>
                    <span class="text-xs font-brand tracking-widest">EDIT PROFILE</span>
                </button>
            </div>
        </div>
    </div>

    <div id="edit-auth-modal" class="floating-modal" onclick="handleExit()">
        <div class="modal-box p-8" onclick="event.stopPropagation()">
            <h3 class="font-brand text-[10px] text-blue-500 mb-8 tracking-[0.4em]">AUTHORIZE</h3>
            <input type="password" id="auth-code" class="edit-input mb-4" placeholder="••••••••">
            <button onclick="checkAuth('${userId}')" class="w-full bg-blue-600/20 border border-blue-500 text-blue-500 py-4 rounded-xl font-brand text-[10px]">VERIFY</button>
        </div>
    </div>

    <div id="edit-profile-modal" class="floating-modal" onclick="handleExit()">
        <div class="modal-box flex flex-col h-[85vh]" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h3 class="font-brand text-[10px] text-blue-500 tracking-[0.4em]">MOD_SYSTEM</h3>
                <div onclick="handleExit()" class="text-white opacity-40"><i class="fas fa-times"></i></div>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <div><label class="edit-label">Name</label><input type="text" id="up-name" class="edit-input" value="${name}"></div>
                <div>
                    <label class="edit-label">Identity Asset</label>
                    <div class="upload-trigger" onclick="document.getElementById('in-photo').click()">UPLOAD PHOTO</div>
                    <input type="file" id="in-photo" class="hidden" accept="image/*" onchange="uploadAsset(this, 'photo')">
                    <p id="st-photo" class="text-[8px] text-gray-600 mt-2 uppercase"></p>
                </div>
                <div>
                    <label class="edit-label">Bio Sound</label>
                    <div class="upload-trigger" onclick="document.getElementById('in-audio').click()">UPLOAD AUDIO</div>
                    <input type="file" id="in-audio" class="hidden" accept="audio/*" onchange="uploadAsset(this, 'audio')">
                    <p id="st-audio" class="text-[8px] text-gray-600 mt-2 uppercase"></p>
                </div>
                <div><label class="edit-label">YT Music Link</label><input type="text" id="up-yt" class="edit-input" value="${songLink}"></div>
            </div>
            <div class="p-6 bg-black border-t border-white/5">
                <button onclick="commitChanges()" class="w-full bg-blue-600 py-4 rounded-xl font-brand text-[10px]">COMMIT_CHANGES</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="flex justify-between items-center px-6 py-8">
            <button onclick="history.back()" class="glass-panel w-10 h-10 rounded-full flex items-center justify-center text-gray-500"><i class="fas fa-chevron-left"></i></button>
            <span class="font-brand text-[9px] text-gray-500 tracking-[0.4em]">XOS // PROFILE</span>
            <button onclick="openModal('menu-modal')" class="glass-panel w-10 h-10 rounded-xl flex items-center justify-center text-white"><i class="fas fa-bars-staggered"></i></button>
        </div>

        <div class="px-6 mb-10">
            <div class="glass-panel p-7 rounded-[36px]">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 rounded-2xl overflow-hidden border border-white/5"><img src="${photo}" class="w-full h-full object-cover"></div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2 font-brand text-lg uppercase">${name} <i class="fas fa-check-circle text-blue-500 text-[10px]"></i></div>
                        <p class="text-[10px] text-blue-500/50 font-mono tracking-tighter">${userId}@xos</p>
                        <div class="mt-3 flex items-center gap-2">
                            <div onclick="togglePlay()" id="play-btn" class="text-blue-500 cursor-pointer"><i class="fas fa-play"></i></div>
                            ${songLink ? `<a href="${songLink}" target="_blank" class="text-[9px] font-brand tracking-[2px] text-gray-500 uppercase"> ▶️ ${songName}</a>` : `<span class="text-[9px] font-brand tracking-[2px] text-gray-600 uppercase">${songName}</span>`}
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="px-6 grid grid-cols-2 gap-3" id="posts-grid"></div>
    </div>
    `;

    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('profile-root').style.display = 'block';
    loadPosts(userId);
}

// Logic Suite
let uploads = { photo: null, audio: null };

function openModal(id) {
    history.pushState({ modal: id }, '', '');
    const m = document.getElementById(id);
    m.style.display = 'flex';
    setTimeout(() => m.classList.add('active'), 10);
}

function handleExit() { history.back(); }

window.onpopstate = () => {
    document.querySelectorAll('.floating-modal').forEach(m => {
        m.classList.remove('active');
        setTimeout(() => m.style.display = 'none', 300);
    });
};

function togglePlay() {
    const a = document.getElementById('bio-audio');
    const b = document.getElementById('play-btn');
    if (a.paused) { a.play(); b.innerHTML = '<i class="fas fa-pause"></i>'; }
    else { a.pause(); b.innerHTML = '<i class="fas fa-play"></i>'; }
}

function openEditAuth() {
    document.getElementById('menu-modal').classList.remove('active');
    setTimeout(() => {
        document.getElementById('menu-modal').style.display = 'none';
        openModal('edit-auth-modal');
    }, 300);
}

function checkAuth(id) {
    if (document.getElementById('auth-code').value === id + '@432') {
        document.getElementById('edit-auth-modal').classList.remove('active');
        setTimeout(() => {
            document.getElementById('edit-auth-modal').style.display = 'none';
            openModal('edit-profile-modal');
        }, 300);
    } else alert('UNAUTHORIZED');
}

async function uploadAsset(input, type) {
    const st = document.getElementById(`st-${type}`);
    st.textContent = "UPLOADING...";
    const fd = new FormData();
    fd.append('file', input.files[0]);
    fd.append('upload_preset', 'vagprxhr');
    try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/dptphdatf/${type==='audio'?'video':'image'}/upload`, { method:'POST', body:fd });
        const d = await res.json();
        uploads[type] = d.secure_url;
        st.textContent = "✓ READY";
        st.style.color = "#007aff";
    } catch(e) { st.textContent = "FAILED"; }
}

function commitChanges() {
    const yt = document.getElementById('up-yt').value;
    let sName = document.getElementById('up-name').value + "'s Anthem";
    if (yt.includes('music.youtube.com')) {
        const id = yt.split('v=')[1]?.split('&')[0];
        sName = id ? "YT_TRACK_" + id.substring(0,5) : "YT_TRACK";
    }

    const data = {
        name: document.getElementById('up-name').value,
        songLink: yt,
        songName: sName
    };
    if (uploads.photo) data.photo = uploads.photo;
    if (uploads.audio) data.audio = uploads.audio;

    db.ref('profiles/' + userId).update(data).then(() => history.back());
}

function loadPosts(id) {
    db.ref(id + '/posts').on('value', snap => {
        const posts = [];
        const data = snap.val();
        if (data) Object.entries(data).forEach(([k,v]) => posts.push(v));
        document.getElementById('posts-grid').innerHTML = posts.map(p => `
            <div class="glass-panel aspect-square rounded-2xl overflow-hidden opacity-80">
                ${p.type==='video' ? `<video src="${p.src}" muted loop autoplay class="w-full h-full object-cover"></video>` : `<img src="${p.src}" class="w-full h-full object-cover">`}
            </div>
        `).join('') || '<div class="col-span-2 text-center py-10 opacity-10 text-[9px]">EMPTY_GRID</div>';
    });
}
</script>
</body>
</html>
