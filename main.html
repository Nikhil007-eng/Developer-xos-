<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>XOS INT — Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --accent: #fff;
      --bg: #000;
      --card-bg: #111;
      --pill-bg: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.5);
      --text-secondary: rgba(255,255,255,0.6);
      --nav-h: 70px;
      --mention-color: #0a84ff;
      --mention-hover: #409cff;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: 'Space Grotesk', sans-serif; color: #fff; position: fixed; }

    #app { width: 100%; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Top Header */
    .top-header {
      position: sticky; top: 0; z-index: 100;
      padding: env(safe-area-inset-top, 14px) 20px 12px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .brand span { font-weight: 300; opacity: 0.55; }
    .msg-icon { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); backdrop-filter: blur(8px); }
    .msg-icon i { font-size: 15px; color: var(--accent); }

    /* Main Content Area - can be feed or iframe */
    .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: calc(var(--nav-h) + 20px); position: relative; }
    .main-content::-webkit-scrollbar { display: none; }
    
    /* Feed specific */
    .feed-view { display: block; }
    .iframe-view { width: 100%; height: 100%; border: none; background: #000; display: block; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

    /* Horizontal Carousel Feed - centered with peek */
    .carousel-container {
      position: relative;
      height: 540px;
      margin: 10px 0 30px;
      overflow: hidden;
    }
    .carousel-track {
      display: flex;
      height: 100%;
      align-items: center;
      gap: 8px;
      will-change: transform;
    }
    .carousel-card {
      flex-shrink: 0;
      width: 320px;
      height: 510px;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--border);
      will-change: transform, opacity;
    }
    .carousel-card img, .carousel-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }
    .card-profile-row {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .small-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      background: #222;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .small-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .card-info h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
      color: rgba(255,255,255,0.9);
    }
    .card-info p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .mention-link {
      color: var(--mention-color);
      text-decoration: none;
      font-weight: 500;
      pointer-events: auto;
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .mention-link:hover {
      color: var(--mention-hover);
      text-decoration: none;
    }
    .card-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .card-stats i { font-size: 14px; }
    .card-stats .liked { color: #ff3b3b; }
    .save-icon { cursor: pointer; }

    /* Featured Creators */
    .creators-section {
      padding: 0 20px 30px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--accent);
    }
    .creators-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 10px;
    }
    .creators-scroll::-webkit-scrollbar { display: none; }
    .creator-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .creator-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--border);
      position: relative;
      background: var(--pill-bg);
    }
    .creator-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .creator-name {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      height: var(--nav-h);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom, 8px);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      width: 64px;
      height: 52px;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s ease;
    }
    .nav-item:active { transform: scale(0.88); }
    .nav-item i {
      font-size: 21px;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s, transform 0.2s;
    }
    .nav-item.active i { color: #fff; transform: scale(1.08); }
    .nav-label {
      font-size: 9px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.3px;
      transition: color 0.2s;
    }
    .nav-item.active .nav-label { color: rgba(255,255,255,0.85); }
    .nav-pill {
      position: absolute;
      top: 4px;
      width: 28px; height: 3px;
      border-radius: 2px;
      background: #fff;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .nav-item.active .nav-pill { opacity: 1; }

    /* Side-slide menu drawer */
    #menuDrawer {
      position: fixed;
      top: 0; right: -300px;
      width: 280px; height: 100%;
      background: rgba(10,10,10,0.97);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-left: 1px solid rgba(255,255,255,0.08);
      z-index: 700;
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top, 54px) 0 env(safe-area-inset-bottom, 24px);
      transition: right 0.32s cubic-bezier(0.22,1,0.36,1);
    }
    #menuDrawer.open { right: 0; }
    #menuScrim {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 699;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #menuScrim.open { opacity: 1; pointer-events: auto; }
    .menu-top {
      padding: 20px 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .menu-brand { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
    .menu-brand span { font-weight: 300; opacity: 0.5; }
    .menu-user { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .menu-list { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .menu-item {
      display: flex; align-items: center; gap: 16px;
      padding: 15px 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.15s ease;
      margin-bottom: 4px;
    }
    .menu-item:active { background: rgba(255,255,255,0.06); }
    .menu-item i {
      width: 22px; text-align: center;
      font-size: 18px;
      color: rgba(255,255,255,0.55);
    }
    .menu-item span { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.85); }
    .menu-item.danger i, .menu-item.danger span { color: #ff453a; }
    .menu-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 8px 14px; }
    .menu-bottom { padding: 12px 24px; border-top: 1px solid rgba(255,255,255,0.07); }
    .menu-version { font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 0.5px; }

    /* Modal */
    #xmodal {
      position: fixed;
      inset: 0;
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
    }
    #xmodal.open { display: flex; }
    .xm-box {
      width: 90vw;
      max-width: 380px;
      aspect-ratio: 3/5;
      max-height: 84vh;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      position: relative;
    }
    .xm-hdr {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .xm-user { font-weight: 600; font-size: 14px; }
    .xm-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .xm-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .xm-slide {
      min-width: 100%;
      height: 100%;
    }
    .xm-slide img, .xm-slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .xm-dots {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .xmdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: 0.3s;
    }
    .xmdot.on { background: var(--accent); width: 20px; border-radius: 3px; }
    .xm-cap {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 30px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
      z-index: 10;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }
    .xm-like {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 20;
    }
    .xl-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      font-size: 20px;
      transition: 0.2s;
    }
    .xl-btn.liked { color: #ff3b3b; background: rgba(255,59,59,0.15); border-color: #ff3b3b; }
  </style>
</head>
<body>
<div id="app">
  <div class="top-header">
    <div class="brand">XOS <span>INT</span></div>
    <div class="msg-icon"><i class="fas fa-comment-dots"></i></div>
  </div>

  <!-- Main Content Area: dynamic feed or iframe -->
  <div class="main-content" id="mainContent">
    <!-- Feed view will be injected here -->
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" data-nav="0">
      <div class="nav-pill"></div>
      <i class="fas fa-house"></i>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item" data-nav="1">
      <div class="nav-pill"></div>
      <i class="fas fa-film"></i>
      <span class="nav-label">ZYNX</span>
    </div>
    <div class="nav-item" data-nav="2">
      <div class="nav-pill"></div>
      <i class="fas fa-users"></i>
      <span class="nav-label">Profiles</span>
    </div>
    <div class="nav-item" data-nav="3" id="menuBtn">
      <div class="nav-pill"></div>
      <i class="fas fa-bars"></i>
      <span class="nav-label">Menu</span>
    </div>
  </div>

  <!-- Menu scrim + drawer -->
  <div id="menuScrim" onclick="closeMenu()"></div>
  <div id="menuDrawer">
    <div class="menu-top">
      <div class="menu-brand">XOS <span>INT</span></div>
      <div class="menu-user" id="menuUsername"></div>
    </div>
    <div class="menu-list">
      <div class="menu-item" onclick="closeMenu(); showToast('Saved posts coming soon')">
        <i class="fas fa-bookmark"></i><span>Saved Posts</span>
      </div>
      <div class="menu-divider"></div>
      <div class="menu-item" onclick="window.open('https://nikhil007-eng.github.io/xos-social-Id/', '_blank')">
        <i class="fas fa-code"></i><span>Developer</span>
      </div>
      <div class="menu-divider"></div>
      <div class="menu-item danger" onclick="logout()">
        <i class="fas fa-right-from-bracket"></i><span>Sign Out</span>
      </div>
    </div>
    <div class="menu-bottom">
      <div class="menu-version">XOS INT · ALPHA</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="xmodal" onclick="closeMod(event)">
  <div class="xm-box" id="xmBox" onclick="event.stopPropagation()">
    <div class="xm-hdr">
      <span id="xmUser" class="xm-user"></span>
      <button class="xm-close" onclick="closeMod()"><i class="fas fa-times"></i></button>
    </div>
    <div id="xmDots" class="xm-dots"></div>
    <div id="xmTrack" class="xm-track"></div>
    <div class="xm-cap" id="xmCap"></div>
    <div class="xm-like">
      <button id="xlBtn" class="xl-btn" onclick="doLike()"><i class="fas fa-heart"></i></button>
    </div>
  </div>
</div>

<audio id="ap"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyAUk6bBCFPoq-Tu-AiX1nD3LFvhc6g7B7g",
    authDomain: "steel-melody-464711-d6.firebaseapp.com",
    databaseURL: "https://steel-melody-464711-d6-default-rtdb.firebaseio.com",
    projectId: "steel-melody-464711-d6",
    storageBucket: "steel-melody-464711-d6.firebasestorage.app",
    messagingSenderId: "288849938458",
    appId: "1:288849938458:web:d615242bb9f1e1ee0fe9a3"
  });
  const db = firebase.database();
  
  function getCurrentUser() {
    const sessionRaw = localStorage.getItem('xos_session');
    if (!sessionRaw) return { username: 'Guest', userCode: null };
    try { const session = JSON.parse(sessionRaw); return { username: session.username || 'Guest', userCode: session.userCode || null }; } 
    catch(e) { return { username: 'Guest', userCode: null }; }
  }
  const currentUser = getCurrentUser();
  const USERNAME = currentUser.username;

  const STATIC_PFP = { nikhil: 'file_00000000f4f47208a731ff7b47a3b568.png', niranjan: 'IMG-20260222-WA0034 (1).jpg' };
  const STATIC_POSTS = [
    { uniqueId:'s1', uid:'niranjan', name:'Niranjan', pfp:STATIC_PFP.niranjan, pfp2:'', profileUrl:'#', media:[{src:'https://nikhil007-eng.github.io/xosint/nirup1.mp4',type:'video'}], audio:'', cap:'MAHASHIVRATRI', timestamp:Date.now()-3600000 },
    { uniqueId:'s2', uid:'nikhil', name:'Nikhil', pfp:STATIC_PFP.nikhil, pfp2:'', profileUrl:'#', media:[{src:'https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg',type:'image'},{src:'https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg',type:'image'}], audio:'From_The_Start(256k).mp3', cap:'vibes @anush@xos and @test@xos', timestamp:Date.now()-7200000 }
  ];

  let POSTS = [];
  let carouselIndex = 0;
  let activePid = null, mSlide = 0, mTotal = 0;
  let feedHTML = ''; // store generated feed for restoration

  function formatCaptionWithLinks(caption) {
    if (!caption) return '';
    const regex = /\b([a-zA-Z0-9_]+)@xos\b/gi;
    return caption.replace(regex, (match, username) => {
      return `<span class="mention-link" data-username="${username}" onclick="event.stopPropagation(); goToProfile('${username}'); return false;">${match}</span>`;
    });
  }

  function goToProfile(username) {
    window.location.href = `profile.html?u=${encodeURIComponent(username)}`;
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.textContent = msg;
    toast.style.position = 'fixed';
    toast.style.bottom = '90px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.background = 'rgba(0,0,0,0.8)';
    toast.style.backdropFilter = 'blur(10px)';
    toast.style.color = 'white';
    toast.style.padding = '8px 16px';
    toast.style.borderRadius = '40px';
    toast.style.fontSize = '13px';
    toast.style.zIndex = '999';
    toast.style.pointerEvents = 'none';
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.2s';
    document.body.appendChild(toast);
    setTimeout(() => toast.style.opacity = '1', 10);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
  }

  function toggleSavePostById(uid) { showToast('Saved feature coming soon'); }

  async function loadData() {
    try {
      const psnap = await db.ref('profiles').once('value');
      const pdata = psnap.val() || {};
      let uids = Object.keys(pdata);
      if (!uids.includes('nikhil')) uids.push('nikhil');
      const all = [];
      await Promise.all(uids.map(uid =>
        db.ref(uid+'/posts').once('value').then(snap => {
          const d = snap.val(); if (!d) return;
          const p = pdata[uid] || {};
          const nm = (uid==='nikhil' && !p.name) ? 'Nikhil' : (p.name || uid.toUpperCase());
          const pfp = p.photo || STATIC_PFP[uid] || '';
          const pfp2 = p.photo2 || '';
          Object.entries(d).forEach(([pid, v]) => {
            if (!v.src) return;
            all.push({
              uniqueId: uid+'_'+pid, uid, name: nm, pfp, pfp2, profileUrl: 'profile.html?u='+uid,
              media: [{ src: v.src, type: v.type || 'image' }],
              audio: v.audio || '', cap: v.caption || '', timestamp: v.timestamp || 0,
            });
          });
        }).catch(()=>{})
      ));
      all.sort((a,b)=>b.timestamp-a.timestamp);
      const srcs = new Set(all.map(p=>p.media[0]?.src));
      POSTS = [...all, ...STATIC_POSTS.filter(p=>!srcs.has(p.media[0]?.src))];
    } catch(e) { POSTS = [...STATIC_POSTS]; }
    renderFeed();
    setupCarouselSwipe();
  }

  function renderFeed() {
    const container = document.getElementById('mainContent');
    const feedDiv = document.createElement('div');
    feedDiv.className = 'feed-view';
    feedDiv.innerHTML = `
      <div class="carousel-container" id="carouselContainer">
        <div class="carousel-track" id="carouselTrack"></div>
      </div>
      <div class="creators-section">
        <h2 class="section-title">Featured Creators</h2>
        <div class="creators-scroll" id="creatorsRow"></div>
      </div>
    `;
    container.innerHTML = '';
    container.appendChild(feedDiv);
    
    const track = document.getElementById('carouselTrack');
    track.innerHTML = '';
    POSTS.forEach((post, idx) => {
      const card = document.createElement('div');
      card.className = 'carousel-card';
      card.dataset.index = idx;
      const isVideo = post.media[0].type === 'video';
      const mediaHtml = isVideo ? `<video src="${post.media[0].src}" muted autoplay loop playsinline></video>` : `<img src="${post.media[0].src}" loading="lazy">`;
      const liked = parseInt(localStorage.getItem('lk_'+post.uniqueId)) > 0;
      const caption = post.cap || '';
      const lines = caption.split('\n');
      const firstLine = lines[0] || '';
      const restLines = lines.slice(1).join('\n');
      const formattedFirst = formatCaptionWithLinks(firstLine);
      const formattedRest = formatCaptionWithLinks(restLines);
      const profileHtml = `
        <div class="card-profile-row">
          <div class="small-avatar">
            ${post.pfp ? `<img src="${post.pfp}" onerror="this.style.display='none'">` : '<i class="fas fa-user-circle" style="font-size:32px; color:rgba(255,255,255,0.6);"></i>'}
          </div>
          <span class="profile-name">${escapeHtml(post.name)}</span>
        </div>
      `;
      card.innerHTML = `
        ${mediaHtml}
        <div class="card-overlay">
          ${profileHtml}
          <div class="card-bottom">
            <div class="card-info">
              <h3>${formattedFirst}</h3>
              <p>${formattedRest}</p>
            </div>
            <div class="card-stats">
              <span class="${liked ? 'liked' : ''}"><i class="fas fa-heart"></i> ${liked ? parseInt(localStorage.getItem('lk_'+post.uniqueId)) : (post.likes || 0)}</span>
              <span><i class="fas fa-comment"></i></span>
              <span>${ago(post.timestamp)}</span>
              <span class="save-icon" data-uid="${post.uniqueId}" onclick="event.stopPropagation(); toggleSavePostById('${post.uniqueId}')"><i class="far fa-bookmark"></i></span>
            </div>
          </div>
        </div>
      `;
      card.onclick = () => openModFromPost(post);
      track.appendChild(card);
    });
    
    const usersMap = new Map();
    POSTS.forEach(p => { if (!usersMap.has(p.uid)) usersMap.set(p.uid, { name: p.name, pfp: p.pfp, profileUrl: p.profileUrl }); });
    const creators = Array.from(usersMap.values()).slice(0, 8);
    const row = document.getElementById('creatorsRow');
    row.innerHTML = '';
    creators.forEach(c => {
      const item = document.createElement('div');
      item.className = 'creator-item';
      item.onclick = () => window.location.href = c.profileUrl || '#';
      item.innerHTML = `
        <div class="creator-avatar">
          ${c.pfp ? `<img src="${c.pfp}" onerror="this.style.display='none'">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;">📷</div>'}
        </div>
        <span class="creator-name">${escapeHtml(c.name)}</span>
      `;
      row.appendChild(item);
    });
    
    updateCarousel(true);
  }

  function loadPageInMain(pageUrl) {
    const container = document.getElementById('mainContent');
    container.innerHTML = '';
    const iframe = document.createElement('iframe');
    iframe.src = pageUrl;
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    iframe.style.backgroundColor = '#000';
    container.appendChild(iframe);
  }

  function ago(ts) { const d = Date.now() - ts, m = Math.floor(d/60000); if(m<1) return 'now'; if(m<60) return m+'m'; const h = Math.floor(m/60); if(h<24) return h+'h'; return Math.floor(h/24)+'d'; }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Carousel logic
  const CARD_W = 320, CARD_GAP = 2;
  const LERP_FACTOR = 0.12;
  let cx_pos = 0, cx_target = 0, cx_drag = false, cx_raf = null;
  function getSnapX(index) {
    const cw = document.querySelector('.carousel-container')?.offsetWidth || window.innerWidth;
    return -(index * (CARD_W + CARD_GAP) - cw / 2 + CARD_W / 2);
  }
  function applyCarouselFrame() {
    const track = document.getElementById('carouselTrack');
    const cards = document.querySelectorAll('.carousel-card');
    if (!track) return;
    if (!cx_drag) cx_pos += (cx_target - cx_pos) * LERP_FACTOR;
    track.style.transform = `translateX(${cx_pos}px)`;
    const cw = document.querySelector('.carousel-container')?.offsetWidth || window.innerWidth;
    const centerX = cw / 2;
    cards.forEach((card, idx) => {
      const cardCenter = -cx_pos + idx * (CARD_W + CARD_GAP) + CARD_W / 2;
      const dist = Math.abs(cardCenter - centerX);
      const t = Math.min(dist / (CARD_W * 0.85), 1);
      card.style.transform = `scale(${1 - 0.04 * t})`;
      card.style.opacity = 1;
      card.style.boxShadow = t < 0.12 ? '0 20px 40px rgba(0,0,0,0.5)' : 'none';
      card.style.borderColor = t < 0.12 ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)';
    });
    const settled = !cx_drag && Math.abs(cx_target - cx_pos) < 0.1;
    if (!settled) cx_raf = requestAnimationFrame(applyCarouselFrame);
    else { cx_pos = cx_target; track.style.transform = `translateX(${cx_pos}px)`; cx_raf = null; }
  }
  function startCarouselLoop() { if (!cx_raf) cx_raf = requestAnimationFrame(applyCarouselFrame); }
  function updateCarousel(instant) { cx_target = getSnapX(carouselIndex); if (instant) cx_pos = cx_target; startCarouselLoop(); }
  function setupCarouselSwipe() {
    const container = document.getElementById('carouselContainer');
    if (!container) return;
    let startX = 0, lastX = 0, lastT = 0, velocity = 0, isDragging = false, dragBase = 0;
    container.addEventListener('touchstart', e => {
      if (cx_raf) { cancelAnimationFrame(cx_raf); cx_raf = null; }
      startX = e.touches[0].clientX; lastX = startX; lastT = Date.now(); velocity = 0;
      dragBase = cx_pos; isDragging = true; cx_drag = true; startCarouselLoop();
    }, { passive: true });
    container.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - startX;
      if (Math.abs(dx) > 6) e.preventDefault();
      const now = Date.now(), dt = now - lastT;
      if (dt > 0) velocity = (e.touches[0].clientX - lastX) / dt;
      lastX = e.touches[0].clientX; lastT = now;
      let raw = dragBase + dx;
      const minX = getSnapX(POSTS.length - 1), maxX = getSnapX(0);
      if (raw > maxX) raw = maxX + (raw - maxX) * 0.18;
      else if (raw < minX) raw = minX + (raw - minX) * 0.18;
      cx_pos = raw;
    }, { passive: false });
    container.addEventListener('touchend', e => {
      if (!isDragging) return;
      isDragging = false; cx_drag = false;
      const diff = e.changedTouches[0].clientX - startX;
      const isFlick = Math.abs(velocity) > 0.2, isSwipe = Math.abs(diff) > 22;
      if (diff < 0 && (isSwipe || isFlick) && carouselIndex < POSTS.length - 1) carouselIndex++;
      else if (diff > 0 && (isSwipe || isFlick) && carouselIndex > 0) carouselIndex--;
      updateCarousel();
    });
    container.addEventListener('touchcancel', () => { isDragging = false; cx_drag = false; updateCarousel(); });
  }

  // Modal functions
  function openModFromPost(post) {
    activePid = post.uniqueId; mSlide = 0; mTotal = post.media.length;
    document.getElementById('xmUser').textContent = post.name;
    const formattedCap = formatCaptionWithLinks(post.cap || '');
    document.getElementById('xmCap').innerHTML = formattedCap;
    const track = document.getElementById('xmTrack');
    track.innerHTML = post.media.map(m => `<div class="xm-slide">${m.type==='video'?`<video src="${m.src}" autoplay loop playsinline></video>`:`<img src="${m.src}">`}</div>`).join('');
    track.style.width = (post.media.length * 100) + '%';
    document.getElementById('xmDots').innerHTML = post.media.length > 1 ? post.media.map((_,i) => `<div class="xmdot${i===0?' on':''}"></div>`).join('') : '';
    const liked = parseInt(localStorage.getItem('lk_'+post.uniqueId)) > 0;
    document.getElementById('xlBtn').classList.toggle('liked', liked);
    document.getElementById('xmodal').classList.add('open');
    setupModSwipe();
    const ap = document.getElementById('ap'); ap.pause(); ap.src = '';
    if (post.audio) { ap.src = post.audio; ap.play().catch(()=>{}); }
  }
  function setupModSwipe() {
    const box = document.getElementById('xmBox');
    let startX = 0, startY = 0;
    box.ontouchstart = e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; };
    box.ontouchend = e => {
      const dx = startX - e.changedTouches[0].clientX;
      const dy = startY - e.changedTouches[0].clientY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
        const track = document.getElementById('xmTrack');
        if (dx > 0 && mSlide < mTotal - 1) mSlide++;
        else if (dx < 0 && mSlide > 0) mSlide--;
        track.style.transform = `translateX(${-mSlide * 100}%)`;
        document.querySelectorAll('.xmdot').forEach((d,i) => d.classList.toggle('on', i === mSlide));
      } else if (dy > 80) closeMod();
    };
  }
  function closeMod(e) { if(e && e.target !== document.getElementById('xmodal')) return; document.getElementById('xmodal').classList.remove('open'); document.getElementById('xmTrack').innerHTML = ''; }
  function doLike() {
    if(!activePid) return;
    const btn = document.getElementById('xlBtn');
    if(btn.classList.contains('liked')) return;
    btn.classList.add('liked');
    const curr = parseInt(localStorage.getItem('lk_'+activePid)) || 0;
    localStorage.setItem('lk_'+activePid, curr + 1);
    // Update in feed if present
    const card = document.querySelector(`.carousel-card .save-icon[data-uid="${activePid}"]`)?.closest('.carousel-card');
    if (card) {
      const likeSpan = card.querySelector('.card-stats span:first-child');
      if (likeSpan) likeSpan.innerHTML = `<i class="fas fa-heart"></i> ${curr+1}`;
      likeSpan.classList.add('liked');
    }
  }

  // Navigation
  let activeNav = 0;
  function setActiveNav(idx) {
    activeNav = idx;
    document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === idx));
  }
  document.querySelectorAll('.nav-item').forEach((item, idx) => {
    item.addEventListener('click', () => {
      if (idx === 3) { openMenu(); setActiveNav(3); return; }
      if (idx === 0) {
        // restore feed
        renderFeed();
        setActiveNav(0);
      } else if (idx === 1) {
        loadPageInMain('ZYNX.html');
        setActiveNav(1);
      } else if (idx === 2) {
        loadPageInMain('profiloo.html');
        setActiveNav(2);
      }
    });
  });

  function openMenu() {
    document.getElementById('menuDrawer').classList.add('open');
    document.getElementById('menuScrim').classList.add('open');
    document.getElementById('menuUsername').textContent = USERNAME || 'Member';
  }
  function closeMenu() {
    document.getElementById('menuDrawer').classList.remove('open');
    document.getElementById('menuScrim').classList.remove('open');
  }
  function logout() { localStorage.removeItem('xos_session'); location.reload(); }

  window.closeMod = closeMod;
  window.doLike = doLike;
  window.toggleSavePostById = toggleSavePostById;
  window.goToProfile = goToProfile;
  window.showToast = showToast;
  window.closeMenu = closeMenu;
  window.openMenu = openMenu;
  window.logout = logout;

  loadData();
</script>
</body>
