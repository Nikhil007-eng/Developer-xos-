<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>XOS INT — Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --accent: #fff;
      --bg: #000;
      --card-bg: #111;
      --pill-bg: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.5);
      --text-secondary: rgba(255,255,255,0.6);
      --nav-h: 70px;
      --mention-color: #0a84ff;
      --mention-hover: #409cff;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: 'Space Grotesk', sans-serif; color: #fff; position: fixed; }

    #app { width: 100%; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Top Header */
    .top-header {
      position: sticky; top: 0; z-index: 100;
      padding: env(safe-area-inset-top, 14px) 20px 12px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .brand span { font-weight: 300; opacity: 0.7; }
    .msg-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--pill-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); }
    .msg-icon i { font-size: 16px; color: var(--accent); }

    /* Main Content Area */
    .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: calc(var(--nav-h) + 20px); }
    .main-content::-webkit-scrollbar { display: none; }

    /* Horizontal Carousel Feed - centered with peek */
    .carousel-container {
      position: relative;
      height: 540px;
      margin: 10px 0 30px;
      overflow: hidden;
    }
    .carousel-track {
      display: flex;
      height: 100%;
      align-items: center;
      gap: 16px;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: transform;
    }
    .carousel-card {
      flex-shrink: 0;
      width: 280px;
      height: 500px;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      transform: scale(0.92);
      opacity: 0.7;
    }
    .carousel-card.active {
      transform: scale(1);
      opacity: 1;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border-color: rgba(255,255,255,0.2);
    }
    .carousel-card img, .carousel-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.9) 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }
    .card-profile-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .small-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      background: #222;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .small-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .card-info h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
      color: rgba(255,255,255,0.9);
    }
    .card-info p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    /* Mention styling: no underline, just colored text with pointer */
    .mention-link {
      color: var(--mention-color);
      text-decoration: none;
      font-weight: 500;
      pointer-events: auto;
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .mention-link:hover {
      color: var(--mention-hover);
      text-decoration: none;
    }
    .card-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .card-stats i { font-size: 14px; }
    .card-stats .liked { color: #ff3b3b; }
    .save-icon { cursor: pointer; }

    /* Featured Creators */
    .creators-section {
      padding: 0 20px 30px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--accent);
    }
    .creators-scroll {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 10px;
    }
    .creators-scroll::-webkit-scrollbar { display: none; }
    .creator-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .creator-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--border);
      position: relative;
      background: var(--pill-bg);
    }
    .creator-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .creator-name {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--nav-h);
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding-bottom: env(safe-area-inset-bottom, 8px);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 60px;
      height: 50px;
      cursor: pointer;
      position: relative;
    }
    .nav-item i {
      font-size: 22px;
      color: var(--muted);
      transition: color 0.2s;
    }
    .nav-item.active i { color: var(--accent); }
    .nav-item.create i {
      width: 48px;
      height: 32px;
      background: var(--accent);
      color: #000;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .nav-dot {
      position: absolute;
      bottom: 4px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .nav-item.active .nav-dot { opacity: 1; }

    /* Modal */
    #xmodal {
      position: fixed;
      inset: 0;
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
    }
    #xmodal.open { display: flex; }
    .xm-box {
      width: 90vw;
      max-width: 380px;
      aspect-ratio: 3/5;
      max-height: 84vh;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      position: relative;
    }
    .xm-hdr {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .xm-user { font-weight: 600; font-size: 14px; }
    .xm-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .xm-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .xm-slide {
      min-width: 100%;
      height: 100%;
    }
    .xm-slide img, .xm-slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .xm-dots {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .xmdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: 0.3s;
    }
    .xmdot.on { background: var(--accent); width: 20px; border-radius: 3px; }
    .xm-cap {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 30px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.95));
      z-index: 10;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }
    .xm-like {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 20;
    }
    .xl-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      font-size: 20px;
      transition: 0.2s;
    }
    .xl-btn.liked { color: #ff3b3b; background: rgba(255,59,59,0.15); border-color: #ff3b3b; }

    /* Additional panels */
    .panel-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.96);
      backdrop-filter: blur(16px);
      z-index: 500;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      padding: 70px 20px 90px;
    }
    .panel-overlay.open { display: flex; }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 20px;
      font-weight: 600;
    }
    .panel-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .saved-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .saved-item {
      background: #111;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      aspect-ratio: 1 / 1;
    }
    .saved-thumb { width: 100%; height: 100%; object-fit: cover; }
    .saved-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #000, transparent); padding: 12px 8px 6px; font-size: 11px; font-weight: 600; }
    .unsave-icon { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border-radius: 30px; padding: 5px 7px; font-size: 11px; backdrop-filter: blur(8px); z-index: 12; cursor: pointer; }
    .profile-list-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .profile-avatar {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info strong { display: block; font-size: 14px; }
    .profile-info span { font-size: 11px; color: var(--muted); }
    iframe#zynxFrame {
      width: 100%;
      height: 90%;
      border: none;
      background: #000;
      border-radius: 20px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="top-header">
    <div class="brand">XOS <span>INT</span></div>
    <div class="msg-icon"><i class="fas fa-comment-dots"></i></div>
  </div>

  <!-- Main Content (no category pills) -->
  <div class="main-content">
    <div class="carousel-container" id="carouselContainer">
      <div class="carousel-track" id="carouselTrack"></div>
    </div>
    <div class="creators-section">
      <h2 class="section-title">Featured Creators</h2>
      <div class="creators-scroll" id="creatorsRow"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" data-nav="0"><i class="fas fa-home"></i><div class="nav-dot"></div></div>
    <div class="nav-item" data-nav="1"><i class="fas fa-search"></i></div>
    <div class="nav-item create" data-nav="2"><i class="fas fa-plus"></i></div>
    <div class="nav-item" data-nav="3"><i class="fas fa-bell"></i></div>
    <div class="nav-item" data-nav="4"><i class="fas fa-user"></i></div>
  </div>
</div>

<!-- Modal -->
<div id="xmodal" onclick="closeMod(event)">
  <div class="xm-box" id="xmBox" onclick="event.stopPropagation()">
    <div class="xm-hdr">
      <span id="xmUser" class="xm-user"></span>
      <button class="xm-close" onclick="closeMod()"><i class="fas fa-times"></i></button>
    </div>
    <div id="xmDots" class="xm-dots"></div>
    <div id="xmTrack" class="xm-track"></div>
    <div class="xm-cap" id="xmCap"></div>
    <div class="xm-like">
      <button id="xlBtn" class="xl-btn" onclick="doLike()"><i class="fas fa-heart"></i></button>
    </div>
  </div>
</div>

<!-- Panels -->
<div id="savedPanel" class="panel-overlay"><div class="panel-header"><span>📁 Saved Posts</span><div class="panel-close" onclick="closePanel('savedPanel')"><i class="fas fa-times"></i></div></div><div id="savedGridContainer" class="saved-grid"></div></div>
<div id="profilesPanel" class="panel-overlay"><div class="panel-header"><span>👥 Members</span><div class="panel-close" onclick="closePanel('profilesPanel')"><i class="fas fa-times"></i></div></div><div id="profilesListContainer"></div></div>
<div id="settingsPanel" class="panel-overlay"><div class="panel-header"><span>⚙️ Settings</span><div class="panel-close" onclick="closePanel('settingsPanel')"><i class="fas fa-times"></i></div></div><div id="settingsContent"></div></div>
<div id="zynxPanel" class="panel-overlay"><div class="panel-header"><span>🎬 ZYNX</span><div class="panel-close" onclick="closePanel('zynxPanel')"><i class="fas fa-times"></i></div></div><iframe id="zynxFrame" src="about:blank" allow="autoplay" style="width:100%;height:90%;border:none;background:#000;border-radius:20px;"></iframe></div>

<audio id="ap"></audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyAUk6bBCFPoq-Tu-AiX1nD3LFvhc6g7B7g",
    authDomain: "steel-melody-464711-d6.firebaseapp.com",
    databaseURL: "https://steel-melody-464711-d6-default-rtdb.firebaseio.com",
    projectId: "steel-melody-464711-d6",
    storageBucket: "steel-melody-464711-d6.firebasestorage.app",
    messagingSenderId: "288849938458",
    appId: "1:288849938458:web:d615242bb9f1e1ee0fe9a3"
  });
  const db = firebase.database();
  
  function getCurrentUser() {
    const sessionRaw = localStorage.getItem('xos_session');
    if (!sessionRaw) return { username: 'Guest', userCode: null };
    try { const session = JSON.parse(sessionRaw); return { username: session.username || 'Guest', userCode: session.userCode || null }; } 
    catch(e) { return { username: 'Guest', userCode: null }; }
  }
  const currentUser = getCurrentUser();
  const USERNAME = currentUser.username;

  const STATIC_PFP = { nikhil: 'file_00000000f4f47208a731ff7b47a3b568.png', niranjan: 'IMG-20260222-WA0034 (1).jpg' };
  const STATIC_POSTS = [
    { uniqueId:'s1', uid:'niranjan', name:'Niranjan', pfp:STATIC_PFP.niranjan, pfp2:'', profileUrl:'#', media:[{src:'https://nikhil007-eng.github.io/xosint/nirup1.mp4',type:'video'}], audio:'', cap:'MAHASHIVRATRI', timestamp:Date.now()-3600000 },
    { uniqueId:'s2', uid:'nikhil', name:'Nikhil', pfp:STATIC_PFP.nikhil, pfp2:'', profileUrl:'#', media:[{src:'https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg',type:'image'},{src:'https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg',type:'image'}], audio:'From_The_Start(256k).mp3', cap:'vibes @anush@xos and @test@xos', timestamp:Date.now()-7200000 }
  ];

  let POSTS = [];
  let carouselIndex = 0;
  let activePid = null, mSlide = 0, mTotal = 0;

  // Helper: format caption with @xos links (no visible link, just clickable mention)
  function formatCaptionWithLinks(caption) {
    if (!caption) return '';
    // Match any word@xos (word can contain letters, numbers, underscore)
    const regex = /\b([a-zA-Z0-9_]+)@xos\b/gi;
    return caption.replace(regex, (match, username) => {
      return `<span class="mention-link" data-username="${username}" onclick="event.stopPropagation(); goToProfile('${username}'); return false;">${match}</span>`;
    });
  }

  function goToProfile(username) {
    window.location.href = `profile.html?u=${encodeURIComponent(username)}`;
  }

  // Saved posts
  function getSavedKey() { return `xos_saved_${USERNAME}`; }
  function loadSavedPosts() { const raw = localStorage.getItem(getSavedKey()); return raw ? JSON.parse(raw) : []; }
  function savePostsToStorage(arr) { localStorage.setItem(getSavedKey(), JSON.stringify(arr)); }
  function isPostSaved(uniqueId) { return loadSavedPosts().some(p => p.uniqueId === uniqueId); }
  function toggleSavePost(postObj) {
    let saved = loadSavedPosts();
    const exists = saved.find(p => p.uniqueId === postObj.uniqueId);
    if (exists) saved = saved.filter(p => p.uniqueId !== postObj.uniqueId);
    else { const toStore = { uniqueId: postObj.uniqueId, name: postObj.name, pfp: postObj.pfp, pfp2: postObj.pfp2, media: postObj.media, cap: postObj.cap, uid: postObj.uid, profileUrl: postObj.profileUrl, audio: postObj.audio }; saved.unshift(toStore); }
    savePostsToStorage(saved);
    updateSaveButtonUI(postObj.uniqueId, !exists);
    renderSavedGrid();
    return !exists;
  }
  function updateSaveButtonUI(uid, isSavedNow) {
    document.querySelectorAll(`.save-icon[data-uid="${uid}"]`).forEach(btn => {
      btn.innerHTML = isSavedNow ? '<i class="fas fa-bookmark"></i>' : '<i class="far fa-bookmark"></i>';
    });
  }
  function renderSavedGrid() {
    const container = document.getElementById('savedGridContainer');
    const saved = loadSavedPosts();
    if (!saved.length) { container.innerHTML = '<div style="text-align:center;padding:40px;color:gray;">✨ No saved posts yet. Tap bookmark on any post.</div>'; return; }
    let html = '';
    saved.forEach(post => {
      const thumb = post.media?.[0]?.src || '';
      html += `<div class="saved-item" onclick="openPostModalFromSaved('${post.uniqueId}')"><img class="saved-thumb" src="${thumb}" onerror="this.src='https://placehold.co/400/111/333?text=📷'"><div class="saved-info">${escapeHtml(post.name || 'User')}</div><div class="unsave-icon" onclick="event.stopPropagation(); unsaveFromSaved('${post.uniqueId}')"><i class="fas fa-trash-alt"></i></div></div>`;
    });
    container.innerHTML = html;
  }
  function unsaveFromSaved(uid) {
    const saved = loadSavedPosts().filter(p => p.uniqueId !== uid);
    savePostsToStorage(saved);
    renderSavedGrid();
    const globalPost = POSTS.find(p => p.uniqueId === uid);
    if (globalPost) updateSaveButtonUI(uid, false);
  }
  function openPostModalFromSaved(uniqueId) {
    const saved = loadSavedPosts();
    const post = saved.find(p => p.uniqueId === uniqueId);
    if (post) openModalWithPost(post);
  }
  function openModalWithPost(post) {
    activePid = post.uniqueId; mSlide = 0; mTotal = post.media.length;
    document.getElementById('xmUser').textContent = post.name;
    const formattedCap = formatCaptionWithLinks(post.cap || '');
    document.getElementById('xmCap').innerHTML = formattedCap;
    const track = document.getElementById('xmTrack');
    track.innerHTML = post.media.map(m => `<div class="xm-slide">${m.type==='video'?`<video src="${m.src}" autoplay loop playsinline></video>`:`<img src="${m.src}">`}</div>`).join('');
    track.style.width = (post.media.length * 100) + '%';
    document.getElementById('xmDots').innerHTML = post.media.length > 1 ? post.media.map((_,i) => `<div class="xmdot${i===0?' on':''}"></div>`).join('') : '';
    const liked = parseInt(localStorage.getItem('lk_'+post.uniqueId)) > 0;
    document.getElementById('xlBtn').classList.toggle('liked', liked);
    document.getElementById('xmodal').classList.add('open');
    setupModSwipe();
    const ap = document.getElementById('ap'); ap.pause(); ap.src = '';
    if (post.audio) { ap.src = post.audio; ap.play().catch(()=>{}); }
  }

  async function loadData() {
    try {
      const psnap = await db.ref('profiles').once('value');
      const pdata = psnap.val() || {};
      let uids = Object.keys(pdata);
      if (!uids.includes('nikhil')) uids.push('nikhil');
      const all = [];
      await Promise.all(uids.map(uid =>
        db.ref(uid+'/posts').once('value').then(snap => {
          const d = snap.val(); if (!d) return;
          const p = pdata[uid] || {};
          const nm = (uid==='nikhil' && !p.name) ? 'Nikhil' : (p.name || uid.toUpperCase());
          const pfp = p.photo || STATIC_PFP[uid] || '';
          const pfp2 = p.photo2 || '';
          Object.entries(d).forEach(([pid, v]) => {
            if (!v.src) return;
            all.push({
              uniqueId: uid+'_'+pid, uid, name: nm, pfp, pfp2, profileUrl: 'profile.html?u='+uid,
              media: [{ src: v.src, type: v.type || 'image' }],
              audio: v.audio || '', cap: v.caption || '', timestamp: v.timestamp || 0,
            });
          });
        }).catch(()=>{})
      ));
      all.sort((a,b)=>b.timestamp-a.timestamp);
      const srcs = new Set(all.map(p=>p.media[0]?.src));
      POSTS = [...all, ...STATIC_POSTS.filter(p=>!srcs.has(p.media[0]?.src))];
    } catch(e) { POSTS = [...STATIC_POSTS]; }
    renderCarousel();
    renderCreators();
  }

  function renderCarousel() {
    const track = document.getElementById('carouselTrack');
    track.innerHTML = '';
    POSTS.forEach((post, idx) => {
      const card = document.createElement('div');
      card.className = 'carousel-card' + (idx === carouselIndex ? ' active' : '');
      card.dataset.index = idx;
      const isVideo = post.media[0].type === 'video';
      const mediaHtml = isVideo ? `<video src="${post.media[0].src}" muted autoplay loop playsinline></video>` : `<img src="${post.media[0].src}" loading="lazy">`;
      const saved = isPostSaved(post.uniqueId);
      const liked = parseInt(localStorage.getItem('lk_'+post.uniqueId)) > 0;
      
      // Split caption into first line and rest
      const caption = post.cap || '';
      const lines = caption.split('\n');
      const firstLine = lines[0] || '';
      const restLines = lines.slice(1).join('\n');
      const formattedFirst = formatCaptionWithLinks(firstLine);
      const formattedRest = formatCaptionWithLinks(restLines);
      
      const profileHtml = `
        <div class="card-profile-row">
          <div class="small-avatar">
            ${post.pfp ? `<img src="${post.pfp}" onerror="this.style.display='none'">` : '<i class="fas fa-user-circle" style="font-size:32px; color:rgba(255,255,255,0.6);"></i>'}
          </div>
          <span class="profile-name">${escapeHtml(post.name)}</span>
        </div>
      `;
      
      card.innerHTML = `
        ${mediaHtml}
        <div class="card-overlay">
          ${profileHtml}
          <div class="card-bottom">
            <div class="card-info">
              <h3>${formattedFirst}</h3>
              <p>${formattedRest}</p>
            </div>
            <div class="card-stats">
              <span class="${liked ? 'liked' : ''}"><i class="fas fa-heart"></i> ${liked ? parseInt(localStorage.getItem('lk_'+post.uniqueId)) : (post.likes || 0)}</span>
              <span><i class="fas fa-comment"></i></span>
              <span>${ago(post.timestamp)}</span>
              <span class="save-icon" data-uid="${post.uniqueId}" onclick="event.stopPropagation(); toggleSavePostById('${post.uniqueId}')">${saved ? '<i class="fas fa-bookmark"></i>' : '<i class="far fa-bookmark"></i>'}</span>
            </div>
          </div>
        </div>
      `;
      card.onclick = () => openModFromPost(post);
      track.appendChild(card);
    });
    updateCarousel();
  }

  function renderCreators() {
    const usersMap = new Map();
    POSTS.forEach(p => { if (!usersMap.has(p.uid)) usersMap.set(p.uid, { name: p.name, pfp: p.pfp, profileUrl: p.profileUrl }); });
    const creators = Array.from(usersMap.values()).slice(0, 8);
    const row = document.getElementById('creatorsRow');
    row.innerHTML = '';
    creators.forEach(c => {
      const item = document.createElement('div');
      item.className = 'creator-item';
      item.onclick = () => window.location.href = c.profileUrl || '#';
      item.innerHTML = `
        <div class="creator-avatar">
          ${c.pfp ? `<img src="${c.pfp}" onerror="this.style.display='none'">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;">📷</div>'}
        </div>
        <span class="creator-name">${escapeHtml(c.name)}</span>
      `;
      row.appendChild(item);
    });
  }

  function openModFromPost(post) {
    activePid = post.uniqueId; mSlide = 0; mTotal = post.media.length;
    document.getElementById('xmUser').textContent = post.name;
    const formattedCap = formatCaptionWithLinks(post.cap || '');
    document.getElementById('xmCap').innerHTML = formattedCap;
    const track = document.getElementById('xmTrack');
    track.innerHTML = post.media.map(m => `<div class="xm-slide">${m.type==='video'?`<video src="${m.src}" autoplay loop playsinline></video>`:`<img src="${m.src}">`}</div>`).join('');
    track.style.width = (post.media.length * 100) + '%';
    document.getElementById('xmDots').innerHTML = post.media.length > 1 ? post.media.map((_,i) => `<div class="xmdot${i===0?' on':''}"></div>`).join('') : '';
    const liked = parseInt(localStorage.getItem('lk_'+post.uniqueId)) > 0;
    document.getElementById('xlBtn').classList.toggle('liked', liked);
    document.getElementById('xmodal').classList.add('open');
    setupModSwipe();
    const ap = document.getElementById('ap'); ap.pause(); ap.src = '';
    if (post.audio) { ap.src = post.audio; ap.play().catch(()=>{}); }
  }

  function setupModSwipe() {
    const box = document.getElementById('xmBox');
    let startX = 0, startY = 0;
    box.ontouchstart = e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; };
    box.ontouchend = e => {
      const dx = startX - e.changedTouches[0].clientX;
      const dy = startY - e.changedTouches[0].clientY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
        const track = document.getElementById('xmTrack');
        if (dx > 0 && mSlide < mTotal - 1) mSlide++;
        else if (dx < 0 && mSlide > 0) mSlide--;
        track.style.transform = `translateX(${-mSlide * 100}%)`;
        document.querySelectorAll('.xmdot').forEach((d,i) => d.classList.toggle('on', i === mSlide));
      } else if (dy > 80) closeMod();
    };
  }

  function closeMod(e) { if(e && e.target !== document.getElementById('xmodal')) return; document.getElementById('xmodal').classList.remove('open'); document.getElementById('xmTrack').innerHTML = ''; }
  function doLike() {
    if(!activePid) return;
    const btn = document.getElementById('xlBtn');
    if(btn.classList.contains('liked')) return;
    btn.classList.add('liked');
    const curr = parseInt(localStorage.getItem('lk_'+activePid)) || 0;
    localStorage.setItem('lk_'+activePid, curr + 1);
    updateLikeDisplay(activePid, curr+1);
  }
  function updateLikeDisplay(uid, count) {
    const likeSpan = document.querySelector(`.card-stats span[data-uid="${uid}"]`);
    if(likeSpan) likeSpan.innerHTML = `<i class="fas fa-heart"></i> ${count}`;
  }
  function toggleSavePostById(uid) { const post = POSTS.find(p => p.uniqueId === uid); if(post) toggleSavePost(post); }
  function ago(ts) { const d = Date.now() - ts, m = Math.floor(d/60000); if(m<1) return 'now'; if(m<60) return m+'m'; const h = Math.floor(m/60); if(h<24) return h+'h'; return Math.floor(h/24)+'d'; }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Carousel with centering + peek
  function setupCarouselSwipe() {
    const container = document.getElementById('carouselContainer');
    let startX = 0, isDragging = false;
    container.addEventListener('touchstart', e => { startX = e.touches[0].clientX; isDragging = true; }, {passive: true});
    container.addEventListener('touchmove', e => { if (isDragging && Math.abs(e.touches[0].clientX - startX) > 50) e.preventDefault(); }, {passive: false});
    container.addEventListener('touchend', e => {
      if (!isDragging) return;
      isDragging = false;
      const diff = e.changedTouches[0].clientX - startX;
      if (Math.abs(diff) > 60) {
        if (diff < 0 && carouselIndex < POSTS.length - 1) carouselIndex++;
        else if (diff > 0 && carouselIndex > 0) carouselIndex--;
        updateCarousel();
      }
    });
  }
  function updateCarousel() {
    const cards = document.querySelectorAll('.carousel-card');
    cards.forEach((card, idx) => card.classList.toggle('active', idx === carouselIndex));
    const containerWidth = document.querySelector('.carousel-container').offsetWidth;
    const cardWidth = 280;
    const gap = 16;
    const offset = carouselIndex * (cardWidth + gap) - (containerWidth/2) + (cardWidth/2);
    document.getElementById('carouselTrack').style.transform = `translateX(${-offset}px)`;
  }

  // Panels
  function openPanel(panelId) {
    document.getElementById(panelId).classList.add('open');
    if (panelId === 'savedPanel') renderSavedGrid();
    if (panelId === 'profilesPanel') renderProfilesPanel();
    if (panelId === 'settingsPanel') renderSettingsPanel();
    if (panelId === 'zynxPanel') { const frame = document.getElementById('zynxFrame'); if(frame.src === 'about:blank') frame.src = 'ZYNX.html'; }
  }
  function closePanel(panelId) { document.getElementById(panelId).classList.remove('open'); }
  async function renderProfilesPanel() {
    const container = document.getElementById('profilesListContainer');
    const psnap = await db.ref('profiles').once('value');
    const pdata = psnap.val() || {};
    const entries = Object.values(pdata);
    if(!entries.length) { container.innerHTML = '<div style="text-align:center;padding:40px;">No profiles yet</div>'; return; }
    let html = '';
    entries.forEach(p => {
      const uid = p.id || (p.name||'').toLowerCase();
      html += `<div class="profile-list-item" onclick="window.location.href='profile.html?u=${encodeURIComponent(uid)}'">
        <div class="profile-avatar">${p.photo ? `<img src="${p.photo}" onerror="this.style.display='none'">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">👤</div>'}</div>
        <div class="profile-info"><strong>${escapeHtml(p.name||uid)}</strong><span>@${uid}</span></div>
      </div>`;
    });
    container.innerHTML = html;
  }
  function renderSettingsPanel() {
    const container = document.getElementById('settingsContent');
    container.innerHTML = `<div style="margin:0 0 20px 0;padding:16px;background:rgba(255,255,255,0.03);border-radius:20px;display:flex;align-items:center;gap:14px;"><div style="width:52px;height:52px;border-radius:14px;background:#111;display:flex;align-items:center;justify-content:center;">${USERNAME.charAt(0).toUpperCase()}</div><div><strong>${escapeHtml(USERNAME)}</strong><div style="font-size:11px;color:var(--muted);">Member</div></div></div>
    <div><div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="closePanel('settingsPanel');openPanel('savedPanel');"><span>📚 Saved posts</span><i class="fas fa-chevron-right"></i></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="logout()"><span>🚪 Sign out</span><i class="fas fa-sign-out-alt"></i></div></div>`;
  }
  function logout() { localStorage.removeItem('xos_session'); location.reload(); }

  // Bottom navigation
  document.querySelectorAll('.nav-item').forEach((item, idx) => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      if (idx === 0) { closePanel('savedPanel'); closePanel('profilesPanel'); closePanel('settingsPanel'); closePanel('zynxPanel'); }
      else if (idx === 1) openPanel('profilesPanel');
      else if (idx === 2) openPanel('zynxPanel');
      else if (idx === 3) openPanel('settingsPanel');
      else if (idx === 4) openPanel('savedPanel');
    });
  });

  window.closeMod = closeMod; window.doLike = doLike; window.toggleSavePostById = toggleSavePostById; window.openPostModalFromSaved = openPostModalFromSaved; window.unsaveFromSaved = unsaveFromSaved; window.openPanel = openPanel; window.closePanel = closePanel; window.logout = logout; window.goToProfile = goToProfile;
  loadData();
  setTimeout(() => setupCarouselSwipe(), 100);
</script>
</body>
</html>
