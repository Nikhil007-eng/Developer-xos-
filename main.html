<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>XOS INT</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #007aff;
      --bg: #000;
      --border: rgba(255,255,255,0.07);
      --muted: rgba(255,255,255,0.38);
      --nav-h: 76px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; position: fixed; }

    #app { width: 100%; height: 100dvh; overflow: hidden; }
    .page-wrapper { display: flex; width: 400%; height: 100%; transition: transform 0.42s cubic-bezier(0.25,1,0.5,1); will-change: transform; }
    .page { width: 25%; height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .page::-webkit-scrollbar { display: none; }
    #page-home, #page-profiles, #page-settings { padding-bottom: calc(var(--nav-h) + 20px); }
    #page-zynx { padding-bottom: 0; }

    /* TOP BAR */
    .top-bar {
      position: sticky; top: 0; z-index: 50;
      padding: env(safe-area-inset-top, 14px) 18px 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.97) 65%, transparent);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 3px; font-weight: 700; }
    .brand span { color: var(--accent); }
    .icon-btn { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer; }

    /* ── STORY ROW — plain square, zero ring/glow ── */
    .story-scroll { display: flex; gap: 10px; padding: 4px 16px 14px; overflow-x: auto; scrollbar-width: none; }
    .story-scroll::-webkit-scrollbar { display: none; }
    .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; cursor: pointer; }

    /* clean rounded square — no border, no shadow, no gradient */
    .story-sq {
      width: 62px; height: 62px;
      border-radius: 15px;
      overflow: hidden;
      background: #111;
      position: relative;
    }
    .story-sq .av-wrap { position: absolute; inset: 0; }
    .story-sq .av-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.7s ease; }
    .story-sq .av-wrap .av2 { opacity: 0; }
    .story-sq .initials { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 17px; color: rgba(255,255,255,0.4); }

    .story-name { font-size: 10px; color: var(--muted); max-width: 62px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .feed-sep { height: 1px; background: var(--border); margin: 0 0 8px; }

    /* ── FULL-WIDTH POST CARD ── */
    .post-card { width: 100%; background: var(--bg); }

    .post-header { display: flex; align-items: center; padding: 10px 14px; gap: 10px; cursor: pointer; }

    /* square pfp in header — no ring, no border */
    .post-pfp {
      width: 36px; height: 36px; border-radius: 10px;
      overflow: hidden; flex-shrink: 0; background: #111;
      position: relative;
    }
    .post-pfp .av-wrap { position: absolute; inset: 0; }
    .post-pfp .av-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.7s ease; }
    .post-pfp .av-wrap .av2 { opacity: 0; }
    .post-pfp .initials { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 13px; color: rgba(255,255,255,0.4); }

    .post-uinfo { flex: 1; min-width: 0; }
    .post-uname { font-size: 13px; font-weight: 600; display: block; }
    .post-ucap { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-dots { color: rgba(255,255,255,0.22); font-size: 20px; padding: 4px 6px; cursor: pointer; line-height: 1; }

    /* full-width square media */
    .post-media { width: 100%; aspect-ratio: 1/1; overflow: hidden; position: relative; background: #080808; }
    .post-track { display: flex; width: 100%; height: 100%; transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); }
    .post-slide { min-width: 100%; height: 100%; }
    .post-slide img, .post-slide video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .cdots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 5; }
    .cdot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.28); transition: 0.3s; }
    .cdot.on { background: var(--accent); width: 14px; border-radius: 4px; }

    .multi-badge { position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; font-size: 10px; color: rgba(255,255,255,0.75); z-index: 5; }
    .song-pill { position: absolute; top: 10px; left: 10px; z-index: 5; background: rgba(0,0,0,0.55); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 5px 10px; display: flex; align-items: center; gap: 6px; }
    .song-pill i { color: var(--accent); font-size: 8px; animation: spin 2s linear infinite; }
    .song-pill span { font-size: 9px; color: rgba(255,255,255,0.45); font-family: 'Space Mono', monospace; letter-spacing: 1px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .post-actions { display: flex; align-items: center; padding: 10px 14px 4px; gap: 16px; }
    .act { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 21px; cursor: pointer; padding: 2px; transition: color 0.2s, transform 0.15s; }
    .act:active { transform: scale(0.82); }
    .act.liked { color: #ff3b3b; }
    .act-save { margin-left: auto; }

    .post-likes { padding: 2px 14px 5px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.82); }
    .post-cap-text { padding: 0 14px 8px; font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.62); }
    .post-cap-text strong { color: #fff; font-weight: 600; margin-right: 5px; }
    .post-ts { padding: 0 14px 14px; font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.5px; text-transform: uppercase; }
    .post-divider { height: 6px; background: rgba(255,255,255,0.02); margin-bottom: 2px; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 0 16px; padding-bottom: env(safe-area-inset-bottom, 8px); height: var(--nav-h); display: flex; align-items: center; }
    .nav-glass { width: 100%; background: rgba(8,8,10,0.82); backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%); border: 1px solid rgba(255,255,255,0.08); border-radius: 22px; height: 56px; display: flex; align-items: center; justify-content: space-around; padding: 0 6px; box-shadow: 0 8px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05); }
    .ni-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; width: 56px; height: 46px; border-radius: 14px; cursor: pointer; position: relative; }
    .ni-item .ico { font-size: 19px; color: rgba(255,255,255,0.24); transition: color 0.25s, transform 0.25s; }
    .ni-item .lbl { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.15); font-family: 'Space Mono', monospace; transition: color 0.25s; }
    .ni-item.on .ico { color: var(--accent); transform: scale(1.1); }
    .ni-item.on .lbl { color: var(--accent); }
    .ni-item.on::before { content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%); width: 18px; height: 2px; background: var(--accent); border-radius: 0 0 3px 3px; }

    /* PROFILES PAGE */
    .p-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .p-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; }
    .p-row:active { background: rgba(255,255,255,0.07); }
    .p-av { width: 48px; height: 48px; border-radius: 13px; overflow: hidden; flex-shrink: 0; background: #111; position: relative; }
    .p-av .av-wrap { position: absolute; inset: 0; }
    .p-av .av-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.7s ease; }
    .p-av .av-wrap .av2 { opacity: 0; }
    .p-av .initials { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 15px; color: rgba(255,255,255,0.4); }
    .p-info strong { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .p-info span { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
    .tick-blue { color: #007aff; font-size: 10px; }
    .tick-red { color: #ff3131; font-size: 11px; animation: rPulse 2s infinite ease-in-out; }
    @keyframes rPulse { 0%,100%{filter:drop-shadow(0 0 2px rgba(255,49,49,.4))} 50%{filter:drop-shadow(0 0 8px rgba(255,49,49,.9))} }
    .p-chev { color: rgba(255,255,255,0.12); font-size: 12px; margin-left: auto; }

    /* SETTINGS */
    .s-user { margin: 12px 16px; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; display: flex; align-items: center; gap: 14px; }
    .s-av { width: 52px; height: 52px; border-radius: 14px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--accent); flex-shrink: 0; position: relative; }
    .s-av .av-wrap { position: absolute; inset: 0; }
    .s-av .av-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .s-info strong { font-size: 15px; font-weight: 600; display: block; }
    .s-info span { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
    .s-list { padding: 0 16px; }
    .s-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .s-row:last-child { border-bottom: none; }
    .s-left { display: flex; align-items: center; gap: 14px; }
    .s-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .s-text strong { font-size: 14px; font-weight: 500; display: block; margin-bottom: 2px; }
    .s-text span { font-size: 11px; color: var(--muted); }
    .s-chev { color: rgba(255,255,255,0.12); font-size: 12px; }

    /* ZYNX */
    #page-zynx iframe { width: 100%; height: 100%; border: none; }

    /* SKELETON */
    .sk { background: linear-gradient(90deg, #0e0e0e 25%, #181818 50%, #0e0e0e 75%); background-size: 200%; animation: sh 1.4s infinite; }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* EXPAND MODAL */
    #xmodal { position: fixed; inset: 0; z-index: 600; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(14px); }
    #xmodal.open { display: flex; }
    .xm-box { width: 90vw; max-width: 380px; aspect-ratio: 3/5; max-height: 84vh; background: #000; border: 1px solid var(--border); border-radius: 24px; overflow: hidden; position: relative; }
    .xm-hdr { position: absolute; top: 10px; left: 10px; right: 10px; height: 42px; background: rgba(255,255,255,0.07); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; z-index: 10; }
    .xm-pfp { width: 24px; height: 24px; border-radius: 7px; object-fit: cover; }
    .xm-user { font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; }
    .xm-close { width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; }
    .xm-track { display: flex; width: 100%; height: 100%; transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); }
    .xm-slide { min-width: 100%; height: 100%; }
    .xm-slide img, .xm-slide video { width: 100%; height: 100%; object-fit: cover; }
    .xm-dots { position: absolute; top: 62px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 10; }
    .xmdot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: 0.3s; }
    .xmdot.on { background: var(--accent); width: 12px; border-radius: 3px; }
    .xm-cap { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.92) 80%); z-index: 10; pointer-events: none; }
    .xm-like { position: absolute; bottom: 16px; right: 14px; display: flex; flex-direction: column; align-items: center; z-index: 20; }
    .xl-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; transition: 0.2s; }
    .xl-btn.liked { color: #ff3b3b; background: rgba(255,59,59,0.1); border-color: #ff3b3b; }
    .xl-count { font-family: 'Orbitron', sans-serif; font-size: 8px; margin-top: 4px; color: #555; }
  </style>
</head>

  const STATIC_POSTS = [
    { uniqueId:'s1', uid:'niranjan', name:'Niranjan', pfp:STATIC_PFP.niranjan, pfp2:'', profileUrl:'profile.html?u=niranjan', media:[{src:'https://nikhil007-eng.github.io/xosint/nirup1.mp4',type:'video'}], audio:'', cap:'MAHASHIVRATRI', timestamp:0 },
    { uniqueId:'s2', uid:'nikhil', name:'Nikhil', pfp:STATIC_PFP.nikhil, pfp2:'', profileUrl:'profile.html?u=nikhil', media:[{src:'https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg',type:'image'},{src:'https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg',type:'image'}], audio:'From_The_Start(256k).mp3', cap:'vibes', timestamp:0 }
  ];

  let POSTS = [], cur = 0, zynxOn = false;
  let activePid = null, mSlide = 0, mTotal = 0;
  let mSX=0, mSY=0, mDrag=false, mDir=null;
  const toggleIds = [];

  /* ── PAGE SWIPE ── */
  const pw = document.getElementById('pw');
  let pgSX=0, pgSY=0, pgDrag=false, pgDir=null;
  pw.addEventListener('touchstart',e=>{pgSX=e.touches[0].clientX;pgSY=e.touches[0].clientY;pgDrag=true;pgDir=null;},{passive:true});
  pw.addEventListener('touchmove',e=>{
    if(!pgDrag)return;
    const dx=e.touches[0].clientX-pgSX,dy=e.touches[0].clientY-pgSY;
    if(!pgDir)pgDir=Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10?'X':'Y';
    if(pgDir==='X'){e.preventDefault();const pct=Math.max(-75,Math.min(0,cur*-25+(dx/window.innerWidth)*25));pw.style.transition='none';pw.style.transform=`translateX(${pct}%)`;}
  },{passive:false});
  pw.addEventListener('touchend',e=>{
    if(!pgDrag||pgDir!=='X'){pgDrag=false;return;}pgDrag=false;
    const dx=e.changedTouches[0].clientX-pgSX;
    if(dx<-window.innerWidth*.2&&cur<3)go(cur+1);
    else if(dx>window.innerWidth*.2&&cur>0)go(cur-1);
    else snap();
  },{passive:true});

  function snap(){pw.style.transition='transform 0.38s cubic-bezier(0.25,1,0.5,1)';pw.style.transform=`translateX(${cur*-25}%)`;}
  function go(idx){
    if(idx<0||idx>3)return;
    cur=idx;
    pw.style.transition='transform 0.42s cubic-bezier(0.25,1,0.5,1)';
    pw.style.transform=`translateX(${idx*-25}%)`;
    [0,1,2,3].forEach(i=>document.getElementById('n'+i).classList.toggle('on',i===idx));
    document.getElementById('bnav').style.display=idx===1?'none':'flex';
    if(idx===1&&!zynxOn){document.getElementById('zynxFrame').src='ZYNX.html';zynxOn=true;}
  }

  /* ── LOAD ── */
  async function load(){
    const name=localStorage.getItem(SK)||'Guest';
    document.getElementById('sName').textContent=name;
    document.getElementById('sAv').textContent=name.slice(0,1).toUpperCase();

    try{
      const psnap=await db.ref('profiles').once('value');
      const pdata=psnap.val()||{};
      renderProfiles(pdata);

      const me=pdata[name.toLowerCase()];
      if(me?.photo){
        const av=document.getElementById('sAv');
        av.innerHTML=`<div class="av-wrap"><img src="${me.photo}"></div>`;
      }

      let uids=Object.keys(pdata);
      if(!uids.includes('nikhil'))uids.push('nikhil');

      const all=[];
      await Promise.all(uids.map(uid=>
        db.ref(uid+'/posts').once('value').then(snap=>{
          const d=snap.val();if(!d)return;
          const p=pdata[uid]||{};
          const isN=uid==='nikhil'&&!p.name;
          const nm=isN?'Nikhil':(p.name||uid.toUpperCase());
          /* pfp: use profile.photo first, fall back to static path */
          const pfp=p.photo||STATIC_PFP[uid]||'';
          const pfp2=p.photo2||'';
          Object.entries(d).forEach(([pid,v])=>{
            if(!v.src)return;
            all.push({uniqueId:uid+'_'+pid,uid,name:nm,pfp,pfp2,profileUrl:'profile.html?u='+uid,media:[{src:v.src,type:v.type||'image'}],audio:v.audio||'',cap:v.caption||'',timestamp:v.timestamp||0});
          });
        }).catch(()=>{})
      ));
      all.sort((a,b)=>b.timestamp-a.timestamp);
      const srcs=new Set(all.map(p=>p.media[0]?.src));
      POSTS=[...all,...STATIC_POSTS.filter(p=>!srcs.has(p.media[0]?.src))];
    }catch(e){POSTS=[...STATIC_POSTS];}

    renderFeed();
    renderStories();
  }

  /* ── STORIES ── */
  function renderStories(){
    const row=document.getElementById('storyRow');
    row.innerHTML='';
    const seen=new Set(),users=[];
    POSTS.forEach(p=>{if(!seen.has(p.uid)){seen.add(p.uid);users.push(p);}});
    users.forEach(p=>{
      const item=document.createElement('div');
      item.className='story-item';
      item.onclick=()=>location.href=p.profileUrl;
      item.innerHTML=`<div class="story-sq">${pfpInner(p.pfp,p.pfp2,(p.name||'?').slice(0,2).toUpperCase())}</div><span class="story-name">${p.name}</span>`;
      row.appendChild(item);
      if(p.pfp&&p.pfp2){const w=item.querySelector('.av-wrap');if(w)startToggle(w.querySelector('.av1'),w.querySelector('.av2'));}
    });
  }

  function pfpInner(pfp,pfp2,init){
    if(pfp&&pfp2)return`<div class="av-wrap"><img class="av1" src="${pfp}" onerror="this.style.display='none'"><img class="av2" src="${pfp2}" onerror="this.style.display='none'"></div>`;
    if(pfp)return`<div class="av-wrap"><img src="${pfp}" onerror="this.style.display='none'"></div>`;
    return`<div class="initials">${init}</div>`;
  }

  function startToggle(a1,a2){
    if(!a1||!a2)return;
    let s=true;
    const id=setInterval(()=>{s=!s;a1.style.opacity=s?'1':'0';a2.style.opacity=s?'0':'1';},3000);
    toggleIds.push(id);
  }

  /* ── FEED ── */
  function renderFeed(){
    const feed=document.getElementById('feed');
    feed.innerHTML='';
    if(!POSTS.length){feed.innerHTML='<div style="text-align:center;padding:60px 0;font-family:Space Mono,monospace;font-size:10px;color:rgba(255,255,255,0.12);letter-spacing:2px;text-transform:uppercase;">NO POSTS YET</div>';return;}
    POSTS.forEach((post,idx)=>{
      const card=document.createElement('div');
      card.className='post-card';
      const slides=post.media.map(m=>`<div class="post-slide">${m.type==='video'?`<video src="${m.src}" muted autoplay loop playsinline style="width:100%;height:100%;object-fit:cover;display:block;"></video>`:`<img src="${m.src}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">`}</div>`).join('');
      const dots=post.media.length>1?`<div class="cdots" id="cd${idx}">${post.media.map((_,i)=>`<div class="cdot${i===0?' on':''}"></div>`).join('')}</div>`:'';
      const multi=post.media.length>1?`<div class="multi-badge"><i class="fas fa-clone"></i></div>`:'';
      const song=post.audio?`<div class="song-pill"><i class="fas fa-compact-disc"></i><span>Audio</span></div>`:'';
      const ts=post.timestamp?ago(post.timestamp):'recently';
      const lk=parseInt(localStorage.getItem('lk_'+post.uniqueId))||0;
      card.innerHTML=`
        <div class="post-header" onclick="location.href='${post.profileUrl}'">
          <div class="post-pfp">${pfpInner(post.pfp,post.pfp2,(post.name||'?').slice(0,1).toUpperCase())}</div>
          <div class="post-uinfo"><span class="post-uname">${post.name}</span><span class="post-ucap">${post.cap||'XOS INT'}</span></div>
          <div class="post-dots" onclick="event.stopPropagation();openMod(${idx})">···</div>
        </div>
        <div class="post-media">
          <div class="post-track" id="pt${idx}">${slides}</div>
          ${dots}${song}${multi}
        </div>
        <div class="post-actions">
          <button class="act${lk>0?' liked':''}" onclick="qLike(this,'${post.uniqueId}')"><i class="fas fa-heart"></i></button>
          <button class="act" onclick="openMod(${idx})"><i class="far fa-comment"></i></button>
          <button class="act"><i class="far fa-paper-plane"></i></button>
          <button class="act act-save"><i class="far fa-bookmark"></i></button>
        </div>
        <div class="post-likes" id="lc_${post.uniqueId}">${lk} likes</div>
        <div class="post-cap-text"><strong>${post.name}</strong>${post.cap||''}</div>
        <div class="post-ts">${ts}</div>
        <div class="post-divider"></div>`;
      feed.appendChild(card);
      if(post.media.length>1)setupSwipe(card.querySelector('.post-media'),idx,post.media.length);
      if(post.pfp&&post.pfp2){const w=card.querySelector('.post-pfp .av-wrap');if(w)startToggle(w.querySelector('.av1'),w.querySelector('.av2'));}
    });
  }

  function setupSwipe(el,idx,total){
    let sx=0,drag=false,dir=null,s=0;
    el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;drag=true;dir=null;},{passive:true});
    el.addEventListener('touchmove',e=>{if(!drag)return;const dx=e.touches[0].clientX-sx;if(!dir)dir=Math.abs(dx)>8?'X':'Y';if(dir==='X')e.preventDefault();},{passive:false});
    el.addEventListener('touchend',e=>{if(!drag||dir!=='X'){drag=false;return;}drag=false;const dx=e.changedTouches[0].clientX-sx;if(dx<-50&&s<total-1)s++;else if(dx>50&&s>0)s--;const t=document.getElementById('pt'+idx);t.style.transform=`translateX(${s*-100}%)`;const de=document.getElementById('cd'+idx);if(de)de.querySelectorAll('.cdot').forEach((d,i)=>d.classList.toggle('on',i===s));},{passive:true});
  }

  /* ── MODAL ── */
  function openMod(idx){
    const p=POSTS[idx];activePid=p.uniqueId;mSlide=0;mTotal=p.media.length;
    document.getElementById('xmPfp').src=p.pfp||'';
    document.getElementById('xmUser').textContent=p.name;
    document.getElementById('xmCap').textContent=p.cap;
    const track=document.getElementById('xmTrack');
    track.innerHTML=p.media.map(m=>`<div class="xm-slide">${m.type==='video'?`<video src="${m.src}" autoplay loop playsinline style="width:100%;height:100%;object-fit:cover;"></video>`:`<img src="${m.src}" style="width:100%;height:100%;object-fit:cover;">`}</div>`).join('');
    track.style.width=(p.media.length*100)+'%';
    track.querySelectorAll('.xm-slide').forEach(s=>s.style.minWidth=(100/p.media.length)+'%');
    const dots=document.getElementById('xmDots');
    dots.innerHTML=p.media.length>1?p.media.map((_,i)=>`<div class="xmdot${i===0?' on':''}"></div>`).join(''):'';
    const lk=parseInt(localStorage.getItem('lk_'+p.uniqueId))||0;
    document.getElementById('xlCnt').textContent=lk;
    document.getElementById('xlBtn').classList.remove('liked');
    const box=document.getElementById('xmBox');
    box.style.transform='translateY(0)';box.style.opacity='1';
    document.getElementById('xmodal').classList.add('open');
    const ap=document.getElementById('ap');ap.pause();ap.src='';
    if(p.audio){ap.src=p.audio;ap.play().catch(()=>{});}
    setupModSwipe();
  }

  function setupModSwipe(){
    const box=document.getElementById('xmBox'),track=document.getElementById('xmTrack');
    box.ontouchstart=e=>{mSX=e.touches[0].clientX;mSY=e.touches[0].clientY;mDrag=true;mDir=null;};
    box.ontouchmove=e=>{
      if(!mDrag)return;
      const dx=e.touches[0].clientX-mSX,dy=e.touches[0].clientY-mSY;
      if(!mDir)mDir=Math.abs(dx)>Math.abs(dy)?'X':'Y';
      if(mDir==='X'){track.style.transition='none';track.style.transform=`translateX(${(-mSlide*box.offsetWidth)+dx}px)`;}
      else{const t=dy<0?dy:dy*.2;box.style.transition='none';box.style.transform=`translateY(${t}px)`;box.style.opacity=''+Math.max(0,1-Math.abs(dy)/500);}
    };
    box.ontouchend=e=>{
      if(!mDrag)return;mDrag=false;
      const dx=mSX-e.changedTouches[0].clientX,dy=mSY-e.changedTouches[0].clientY;
      if(mDir==='X'){track.style.transition='transform 0.35s cubic-bezier(0.16,1,0.3,1)';if(Math.abs(dx)>60){if(dx>0&&mSlide<mTotal-1)mSlide++;else if(dx<0&&mSlide>0)mSlide--;}track.style.transform=`translateX(${-mSlide*box.offsetWidth}px)`;document.getElementById('xmDots').querySelectorAll('.xmdot').forEach((d,i)=>d.classList.toggle('on',i===mSlide));}
      else if(dy>80){box.style.transition='transform 0.35s cubic-bezier(0.16,1,0.3,1),opacity 0.3s';box.style.transform='translateY(-120vh)';box.style.opacity='0';setTimeout(closeMod,320);}
      else{box.style.transition='transform 0.35s cubic-bezier(0.16,1,0.3,1),opacity 0.3s';box.style.transform='translateY(0)';box.style.opacity='1';}
    };
  }

  function closeMod(e){if(e&&e.target&&e.target!==document.getElementById('xmodal'))return;document.getElementById('xmodal').classList.remove('open');const ap=document.getElementById('ap');ap.pause();ap.src='';document.getElementById('xmTrack').innerHTML='';}

  function qLike(btn,id){if(btn.classList.contains('liked'))return;btn.classList.add('liked');const p=parseInt(localStorage.getItem('lk_'+id))||0;localStorage.setItem('lk_'+id,p+1);const el=document.getElementById('lc_'+id);if(el)el.textContent=(p+1)+' likes';}
  function doLike(){if(!activePid)return;const b=document.getElementById('xlBtn');if(b.classList.contains('liked'))return;b.classList.add('liked');const p=parseInt(localStorage.getItem('lk_'+activePid))||0;localStorage.setItem('lk_'+activePid,p+1);document.getElementById('xlCnt').textContent=p+1;const el=document.getElementById('lc_'+activePid);if(el)el.textContent=(p+1)+' likes';}

  /* ── PROFILES ── */
  function renderProfiles(pdata){
    const list=document.getElementById('profilesList');list.innerHTML='';
    const entries=Object.values(pdata).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    if(!entries.length){list.innerHTML='<p style="text-align:center;padding:40px 0;font-family:Space Mono,monospace;font-size:9px;color:rgba(255,255,255,0.12);letter-spacing:2px;text-transform:uppercase;">NO PROFILES</p>';return;}
    entries.forEach(p=>{
      const uid=p.id||(p.name||'').toLowerCase();
      const isAdmin=uid==='nikhil';
      const init=(p.name||'?').slice(0,2).toUpperCase();
      const row=document.createElement('div');row.className='p-row';
      row.onclick=()=>location.href='profile.html?u='+encodeURIComponent(uid);
      let avHtml='';
      if(p.photo&&p.photo2)avHtml=`<div class="av-wrap"><img class="av1" src="${p.photo}" onerror="this.style.display='none'"><img class="av2" src="${p.photo2}" onerror="this.style.display='none'"></div>`;
      else if(p.photo)avHtml=`<div class="av-wrap"><img src="${p.photo}" onerror="this.style.display='none'"></div>`;
      else avHtml=`<div class="initials">${init}</div>`;
      row.innerHTML=`
        <div class="p-av">${avHtml}</div>
        <div class="p-info">
          <strong>${p.name}<i class="fas fa-check-circle ${isAdmin?'tick-red':'tick-blue'}"></i></strong>
          <span>@${uid} · ${isAdmin?'admin':'member'}</span>
        </div>
        <i class="fas fa-chevron-right p-chev"></i>`;
      list.appendChild(row);
      if(p.photo&&p.photo2){const w=row.querySelector('.av-wrap');if(w)startToggle(w.querySelector('.av1'),w.querySelector('.av2'));}
    });
  }

  function ago(ts){const d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
  function logout(){localStorage.removeItem(SK);location.href='index.html';}

  load();
</script>
</body>
</html>
