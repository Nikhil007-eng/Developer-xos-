<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #3b82f6;
            --admin-red: #ff3131;
            --glass: rgba(10, 10, 12, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --bg-color: #000000;
            --text-main: #ffffff;
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.1);
            --text-main: #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        html, body {
            height: 100%; width: 100%; overflow: hidden; position: fixed;
            background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif;
            transition: background-color 0.4s ease;
        }

        .font-brand { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
        }

        .main-container { height: 100dvh; overflow-y: auto; touch-action: pan-y; padding-bottom: 100px; }

        .red-tick-glow { color: var(--admin-red); animation: tickPulse 2s infinite ease-in-out; }
        @keyframes tickPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); filter: drop-shadow(0 0 2px var(--admin-red)); }
            50% { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 8px var(--admin-red)); }
        }

        .floating-modal {
            position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }

        .modal-box {
            width: 82vw; aspect-ratio: 3 / 5; max-width: 380px; max-height: 85vh;
            background: #000; border: 1px solid var(--border); border-radius: 28px;
            overflow: hidden; position: relative; transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .square-modal {
            aspect-ratio: 1 / 1 !important;
            width: 85vw !important;
            max-width: 400px !important;
            border-radius: 32px !important;
        }

        .floating-modal.active { display: flex; opacity: 1; }
        .floating-modal.active .modal-box { transform: scale(1); }

        .menu-window { height: auto !important; padding: 30px; background: var(--glass); border: 1px solid var(--border); }

        .social-btn {
            width: 45px; height: 45px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            transition: 0.3s; color: var(--text-main);
        }
        .social-btn:active { transform: scale(0.9); background: var(--accent); }

        .toggle-track { width: 50px; height: 26px; background: var(--accent); border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle-thumb { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 26px; transition: 0.3s; }
        
        .light-mode .toggle-track { background: rgba(0,0,0,0.1); }
        .light-mode .toggle-thumb { left: 4px; }

        .license-card { width: 360px; padding: 28px; border-radius: 16px; background: #000; border: 1px solid rgba(255,255,255,0.06); color: #eaf1ff; text-align: left; }
        .license-dot { width:6px; height:6px; background:#ffd000; border-radius:50%; display:inline-block; margin-right:6px; }

        .loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 5; transition: opacity 0.5s ease; }
        .spinner { width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .close-btn-circle {
            position: absolute; top: 15px; right: 15px; width: 36px; height: 36px;
            border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            display: flex; align-items: center; justify-content: center; z-index: 110;
        }

        .caption-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 10; }

        /* Smooth Bottom-Up Transition (3/4 Height) */
        #comment-sidebar {
            position: absolute; left: 0; right: 0; bottom: -75%; width: 100%; height: 75%;
            z-index: 120; transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
            border-top: 1px solid var(--border);
            border-radius: 32px 32px 0 0;
        }
        #comment-sidebar.open { bottom: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 0; }
        .comment-item { animation: slideUpFade 0.4s ease-out forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="floating-post" class="floating-modal" onclick="handleExit()">

    <div class="main-container">
        <div class="flex justify-between items-center px-6 py-8">
            <button onclick="history.back()" class="glass-panel w-10 h-10 rounded-full flex items-center justify-center text-gray-400 active:scale-90 transition-transform"><i class="fas fa-chevron-left"></i></button>
            <span class="font-brand text-[9px] text-gray-500 tracking-[0.4em]">ADMIN // PROFILE</span>
            <button onclick="openMenu()" class="glass-panel w-10 h-10 rounded-xl flex items-center justify-center text-white active:scale-90 transition-transform"><i class="fas fa-bars-staggered"></i></button>

        <div id="posts-grid" class="grid grid-cols-2 gap-3 px-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAUk6bBCFPoq-Tu-AiX1nD3LFvhc6g7B7g",
            authDomain: "steel-melody-464711-d6.firebaseapp.com",
            projectId: "steel-melody-464711-d6",
            storageBucket: "steel-melody-464711-d6.firebasestorage.app",
            messagingSenderId: "288849938458",
            appId: "1:288849938458:web:d615242bb9f1e1ee0fe9a3",
            databaseURL: "https://steel-melody-464711-d6-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const POSTS_DATA = [{ type: 'image', src: 'Picsart_26-02-20_19-32-15-424.png', audio: 'nikhilp1.mp3', caption: 'New haircut' }, { type: 'video', src: 'video1.mp4', audio: '', caption: 'yatra' }];
        let activePostIndex = null;
        let commentListener = null;

        window.renderGrid = function() {
            const grid = document.getElementById('posts-grid');
            grid.innerHTML = '';
            POSTS_DATA.forEach((post, index) => {
                const item = document.createElement('div');
                item.className = 'glass-panel aspect-square rounded-2xl overflow-hidden active:scale-95 transition-transform relative';
                item.onclick = () => openPost(index);
                item.innerHTML = post.type === 'video' ? `<video src="${post.src}" class="w-full h-full object-cover opacity-50" muted></video>` : `<img src="${post.src}" class="w-full h-full object-cover opacity-80">`;
                grid.appendChild(item);
            });
        }

        window.openPost = function(index) {
            activePostIndex = index;
            window.history.pushState({ modal: 'active' }, "");
            const post = POSTS_DATA[index];
            const modal = document.getElementById('floating-post');
            const container = document.getElementById('media-container');
            const audio = document.getElementById('post-audio');
            const caption = document.getElementById('post-caption');
            const loader = document.getElementById('media-loader');

            loader.style.opacity = '1';
            caption.innerText = post.caption;
            container.innerHTML = post.type === 'video' ? `<video id="active-video" src="${post.src}" class="w-full h-full object-cover" autoplay loop playsinline></video>` : `<img src="${post.src}" class="w-full h-full object-cover">`;

            if (post.audio) { audio.src = post.audio; audio.play().catch(() => {}); }

            initCommentStream(index);
            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); loader.style.opacity = '0'; }, 10);
        }

        window.toggleComments = function() { document.getElementById('comment-sidebar').classList.toggle('open'); }

        document.getElementById('send-comment').onclick = function() {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text || activePostIndex === null) return;

            push(ref(db, 'comments/' + activePostIndex), {
                text: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                timestamp: Date.now()
            });
            input.value = '';
        }

        function initCommentStream(index) {
            const list = document.getElementById('comment-list');
            const postRef = ref(db, 'comments/' + index);
            
            onValue(postRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) { list.innerHTML = `<div class="text-white/20 text-center text-[10px] mt-10 tracking-widest uppercase">No feedback yet</div>`; return; }
                
                const comments = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                list.innerHTML = comments.map(c => `
                    <div class="comment-item glass-panel p-3 rounded-2xl border border-white/5 relative">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[8px] text-blue-500/60 font-mono">${c.time}</span>
                            <button onclick="window.deleteComment('${c.id}')" class="text-white/10 hover:text-red-500"><i class="fas fa-trash text-[8px]"></i></button>
                        </div>
                        <p class="text-xs text-white/80 font-light">${c.text}</p>
                    </div>
                `).join('');
                list.scrollTop = list.scrollHeight;
            });
        }

        window.deleteComment = function(id) {
            remove(ref(db, `comments/${activePostIndex}/${id}`));
        }

        window.handleExit = function() {
            if (window.history.state && window.history.state.modal === 'active') { window.history.back(); } 
            else { window.killAndHide(); }
        }

        window.killAndHide = function() {
            const video = document.getElementById('active-video');
            if (video) { video.pause(); video.src = ""; }
            const audio = document.getElementById('post-audio');
            if (audio) { audio.pause(); audio.src = ""; }
            document.getElementById('comment-sidebar').classList.remove('open');
            const modals = ['floating-post'];
            modals.forEach(id => { const el = document.getElementById(id); if(el) el.classList.remove('active'); });
            setTimeout(() => { modals.forEach(id => { const el = document.getElementById(id); if(el) el.style.display = 'none'; }); }, 300);
        }

        window.addEventListener('popstate', window.killAndHide);
        renderGrid();
    </script>
</body>
