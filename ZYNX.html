<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ZYNX — Powered by XOS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root { --bg:#000; --accent:#007aff; --border:#1a1a1a; --glass:rgba(10,10,10,0.85); --text:#fff; --muted:#666; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; overflow:hidden; }

/* TOPBAR */
#topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:linear-gradient(to bottom,#000 60%,transparent); }
.topbar-brand { display:flex; flex-direction:column; pointer-events:none; }
.brand-zynx { font-size:14px; font-weight:700; letter-spacing:4px; text-transform:uppercase; }
.tagline-xos { font-size:8px; font-weight:500; letter-spacing:2px; color:var(--accent); text-transform:uppercase; margin-top:2px; }
#close-btn { width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.7); font-size:14px; cursor:pointer; transition:background 0.2s; flex-shrink:0; }
#close-btn:active { background:rgba(255,255,255,0.18); }

/* REEL WRAP */
#reel-wrap { width:100%; height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
#reel-wrap::-webkit-scrollbar { display:none; }
.reel { width:100%; height:100dvh; position:relative; background:var(--bg); overflow:hidden; scroll-snap-align:start; scroll-snap-stop:always; }
.reel-media { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.reel::after { content:''; position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 55%); pointer-events:none; z-index:1; }

/* PROGRESS */
.progress-container { position:absolute; bottom:0; left:0; width:100%; height:2px; background:rgba(255,255,255,0.08); z-index:20; }
.progress-bar { height:100%; width:0%; background:var(--accent); transition:width 0.1s linear; }

/* SIDE ACTIONS — like + share only */
.side-actions { position:absolute; right:16px; bottom:110px; z-index:10; display:flex; flex-direction:column; align-items:center; gap:22px; }
.act { display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; transition:transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275); }
.act:active { transform:scale(0.85); }
.act-icon { width:50px; height:50px; border-radius:50%; background:var(--glass); border:1px solid var(--border); backdrop-filter:blur(25px); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text); }
.act-icon.liked { color:#ff3b5c; border-color:#ff3b5c; box-shadow:0 0 15px rgba(255,59,92,0.2); }
.act-label { font-size:9px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }

/* BOTTOM LEFT — author + caption + disc */
.reel-info { position:absolute; bottom:0; left:0; right:80px; z-index:10; padding:0 20px 36px; }
.author-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.author-pfp { width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,255,255,0.2); object-fit:cover; flex-shrink:0; }
.author-link { text-decoration:none; color:inherit; }
.author-name { font-weight:600; font-size:13px; }
.reel-caption { font-size:13px; line-height:1.5; color:rgba(255,255,255,0.7); margin-bottom:0; }


/* MUSIC DISC — in side-actions, same size as other act-icons */
.music-disc { width:50px; height:50px; border-radius:50%; background:#111; border:1px solid var(--border); overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; animation:discSpin 4s linear infinite; }
.music-disc img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:50%; }
.music-disc .disc-icon { font-size:16px; color:rgba(255,255,255,0.3); }
.music-disc::after { content:""; position:absolute; width:8px; height:8px; border-radius:50%; background:#000; z-index:2; }
@keyframes discSpin { to { transform:rotate(360deg); } }


/* DTAP HEART */
.dtap-heart { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:20; pointer-events:none; }
.dtap-heart i { font-size:80px; color:#fff; opacity:0; transform:scale(0.5); }
.dtap-heart i.pop { animation:heartPop 0.7s forwards; }
@keyframes heartPop { 0%{opacity:0;transform:scale(0.5)} 30%{opacity:1;transform:scale(1.2)} 100%{opacity:0;transform:scale(1)} }

/* VOL INDICATOR */
#vol-indicator { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1000; width:64px; height:64px; background:var(--glass); border:1px solid var(--border); border-radius:50%; backdrop-filter:blur(20px); display:flex; align-items:center; justify-content:center; font-size:20px; opacity:0; pointer-events:none; transition:opacity 0.3s; }
#vol-indicator.show { opacity:1; }

/* LOADER */
#zynx-loader { position:fixed; inset:0; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
#zynx-loader.hidden { display:none; }
.spin-ring { width:32px; height:32px; border:2px solid rgba(255,255,255,0.08); border-top:2px solid var(--accent); border-radius:50%; animation:discSpin 0.8s linear infinite; }
</style>
</head>
<body>

<div id="zynx-loader">
  <div class="spin-ring"></div>
  <p style="font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:3px;text-transform:uppercase;">Loading Zynx</p>
</div>

<div id="topbar">
  <div class="topbar-brand">
    <span class="brand-zynx">ZYNX</span>
    <span class="tagline-xos">Powered by XOS</span>
  </div>
  <button id="close-btn" onclick="history.back()"><i class="fas fa-times"></i></button>
</div>

<div id="reel-wrap"><div id="reel-track"></div></div>
<div id="vol-indicator"><i class="fas fa-volume-up"></i></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAUk6bBCFPoq-Tu-AiX1nD3LFvhc6g7B7g",
  authDomain:"steel-melody-464711-d6.firebaseapp.com",
  databaseURL:"https://steel-melody-464711-d6-default-rtdb.firebaseio.com",
  projectId:"steel-melody-464711-d6",
  storageBucket:"steel-melody-464711-d6.firebasestorage.app",
  messagingSenderId:"288849938458",
  appId:"1:288849938458:web:d615242bb9f1e1ee0fe9a3"
});
const db = firebase.database();
const TG_BOT = "8668013778:AAEnWA0uY3tDUOQP1uHQEVJdcAGaWgfy4eA";
const TG_CID = "7217028526";
const EXTRACTED_USER = sessionStorage.getItem('userName') || "Guest User";

// Known external profile URLs — add more here as needed
const PROFILE_URLS = {
  'nikhil':   'https://nikhil007-eng.github.io/Developer-xos-/Nikhilprof.html',
  'niranjan': 'https://nikhil007-eng.github.io/xosint/',
  'anush':    'https://nikhil007-eng.github.io/xosintanush/'
};

const STATIC_POSTS = [
  { id:'static_niranjan', user:{ name:"NIRANJAN", pfp:"https://nikhil007-eng.github.io/xosint/IMG-20260222-WA0034%20(1).jpg", url:"https://nikhil007-eng.github.io/xosint/" }, src:"https://nikhil007-eng.github.io/xosint/nirup1.mp4", type:"video", audio:"", caption:"Nothing Phone (4a) — Built different.", likes:1, timestamp:0, songUrl:"", songName:"" },
  { id:'static_anush',    user:{ name:"ANUSH",    pfp:"https://nikhil007-eng.github.io/xosintanush/Screenshot_20260221-160725.png", url:"https://nikhil007-eng.github.io/xosintanush/" }, src:"https://nikhil007-eng.github.io/xosintanush/lv_0_20260226150449.mp4", type:"video", audio:"", caption:"journey from 12th to healing hands.", likes:1, timestamp:0, songUrl:"", songName:"" },
  { id:'static_nikhil',   user:{ name:"NIKHIL",   pfp:"https://nikhil007-eng.github.io/Developer-xos-/file_00000000f4f47208a731ff7b47a3b568.png", url:"https://nikhil007-eng.github.io/Developer-xos-/Nikhilprof.html" }, src:"https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg", type:"image", audio:"From_The_Start(256k).mp3", caption:"Image(her pfp) 😅.", likes:1, timestamp:0, songUrl:"", songName:"From The Start" }
];

let POSTS = [];
let muted = false;
let liked = JSON.parse(localStorage.getItem('xos_liked_v2') || '{}');

// Extract YT video ID from any YT/YT Music URL
function extractYTId(url) {
  if (!url) return null;
  const patterns = [/[?&]v=([^&#]+)/, /youtu\.be\/([^?#]+)/, /music\.youtube\.com\/watch\?v=([^&#]+)/];
  for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
  return null;
}
function ytThumb(id) { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }

// INTERSECTION OBSERVER
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const video = entry.target.querySelector('video');
    const audio = entry.target.querySelector('audio');
    const bar   = entry.target.querySelector('.progress-bar');
    if (entry.isIntersecting) {
      if (video) { video.muted = muted; video.currentTime = 0; video.play().catch(()=>{}); video.ontimeupdate = () => { if(video.duration) bar.style.width=(video.currentTime/video.duration*100)+'%'; }; }
      if (audio) { audio.muted = muted; audio.currentTime = 0; audio.play().catch(()=>{}); audio.ontimeupdate = () => { if(audio.duration) bar.style.width=(audio.currentTime/audio.duration*100)+'%'; }; }
    } else {
      if (video) { video.pause(); video.muted = true; video.ontimeupdate = null; bar.style.width='0%'; }
      if (audio) { audio.pause(); audio.muted = true; audio.ontimeupdate = null; bar.style.width='0%'; }
    }
  });
}, { threshold:0.6 });

// LOAD
async function loadPosts() {
  const allPosts = [];
  const profilesSnap = await db.ref('profiles').once('value');
  const profiles = profilesSnap.val() || {};
  let uids = Object.keys(profiles);
  if (!uids.includes('nikhil')) uids.push('nikhil');

  const promises = uids.map(uid =>
    db.ref(uid+'/reels').once('value').then(async snap => {
      let data = snap.val();
      if (!data) { const ps = await db.ref(uid+'/posts').once('value'); data = ps.val(); }
      if (!data) return;
      const profile = profiles[uid] || {};
      let pfp = profile.photo || '';
      let displayName = (profile.name || uid).toUpperCase();
      if (uid==='nikhil' && !profile.name) {
        displayName='NIKHIL';
        pfp = pfp || 'https://nikhil007-eng.github.io/Developer-xos-/file_00000000f4f47208a731ff7b47a3b568.png';
      }
      Object.entries(data).forEach(([postId, v]) => {
        if (!v.src) return;
        allPosts.push({
          id: uid+'_'+postId, uid,
          user: { name:displayName, pfp, url: PROFILE_URLS[uid] || `profile.html?u=${uid}` },
          src:      v.src,
          type:     v.type || 'image',
          audio:    v.audio || '',
          songName: v.songName || profile.songName || '',
          songUrl:  v.songUrl || '',
          caption:  v.caption || '',
          timestamp: v.timestamp || 0,
          likes: 1
        });
      });
    }).catch(()=>{})
  );

  await Promise.all(promises);
  allPosts.sort((a,b) => b.timestamp - a.timestamp);
  const firebaseSrcs = new Set(allPosts.map(p=>p.src));
  POSTS = [...allPosts, ...STATIC_POSTS.filter(p => !firebaseSrcs.has(p.src))];
  document.getElementById('zynx-loader').classList.add('hidden');
  build();
}

// BUILD
function build() {
  const track = document.getElementById('reel-track');
  track.innerHTML = '';
  if (!POSTS.length) {
    track.innerHTML = `<div style="width:100%;height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;"><i class="fas fa-film" style="font-size:32px;color:#222;"></i><p style="font-size:10px;color:#333;letter-spacing:2px;text-transform:uppercase;">No posts yet</p></div>`;
    return;
  }

  POSTS.forEach((p, i) => {
    const isLiked = liked[p.id];
    const reel = document.createElement('div');
    reel.className = 'reel';

    // ── media ──
    let mediaHtml = '';
    if (p.type === 'video') {
      mediaHtml = `<video src="${p.src}" class="reel-media" loop playsinline></video>`;
    } else {
      mediaHtml = `<img src="${p.src}" class="reel-media">`;
      if (p.audio) mediaHtml += `<audio src="${p.audio}" loop></audio>`;
    }

    // ── disc image: YT thumbnail if songUrl, else author pfp, else music icon ──
    const ytId = extractYTId(p.songUrl);
    const discImgSrc = ytId ? ytThumb(ytId) : (p.user.pfp || '');
    const discInner = discImgSrc
      ? `<img src="${discImgSrc}" alt="">`
      : `<i class="fas fa-music disc-icon"></i>`;

    // ── disc as .act below share — spins, taps to YT Music if songUrl set ──
    const discRow = (p.songUrl || p.audio)
      ? `<a class="act" style="text-decoration:none;"
            ${p.songUrl ? `href="${p.songUrl}" target="_blank"` : ''}
            onclick="event.stopPropagation()">
           <div class="music-disc">${discInner}</div>
           <span class="act-label">song</span>
         </a>`
      : '';

    reel.innerHTML = `
      ${mediaHtml}
      <div class="progress-container"><div class="progress-bar"></div></div>
      <div class="dtap-heart"><i class="fas fa-heart"></i></div>

      <div class="side-actions">
        <div class="act" onclick="toggleLike(${i})">
          <div class="act-icon ${isLiked?'liked':''}" id="like-icon-${i}"><i class="fas fa-heart"></i></div>
          <span class="act-label" id="like-count-${i}">${fmt(p.likes+(isLiked?1:0))}</span>
        </div>
        <div class="act" onclick="handleShare()">
          <div class="act-icon"><i class="fas fa-arrow-up-right-from-square"></i></div>
          <span class="act-label">Share</span>
        </div>
        ${discRow}
      </div>

      <div class="reel-info">
        <div class="author-row">
          ${p.user.pfp
            ? `<img src="${p.user.pfp}" class="author-pfp">`
            : `<div class="author-pfp" style="background:#111;display:flex;align-items:center;justify-content:center;"><i class="fas fa-user" style="font-size:10px;color:#555;"></i></div>`}
          <a href="${p.user.url}" class="author-link" target="_blank"><span class="author-name">${p.user.name}</span></a>
        </div>
        <p class="reel-caption">${p.caption}</p>
      </div>`;

    // tap handlers
    reel.addEventListener('click', (e) => {
      if (e.target.closest('.side-actions') || e.target.closest('.author-link') || e.target.closest('a.act')) return;
      let taps = (reel.dataset.taps||0)*1+1;
      reel.dataset.taps = taps;
      if (taps===1) { setTimeout(()=>{ if(reel.dataset.taps==1) toggleMute(); reel.dataset.taps=0; },250); }
      else { if(!liked[p.id]) toggleLike(i); triggerDtap(reel); reel.dataset.taps=0; }
    });

    track.appendChild(reel);
    observer.observe(reel);
  });
}

function toggleMute() {
  muted = !muted;
  document.querySelectorAll('video,audio').forEach(m => m.muted = muted);
  const ind = document.getElementById('vol-indicator');
  ind.innerHTML = muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
  ind.classList.add('show');
  setTimeout(()=>ind.classList.remove('show'), 800);
}
function sendTg(postId) {
  const now = new Date();
  const msg = `🌟 ZYNX INTERACTION\nName: ${EXTRACTED_USER}\nLiked: ${postId}\nDate: ${now.toLocaleDateString('en-GB')}\nTime: ${now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  fetch(`https://api.telegram.org/bot${TG_BOT}/sendMessage?chat_id=${TG_CID}&text=${encodeURIComponent(msg)}`).catch(()=>{});
}
function toggleLike(idx) {
  const p = POSTS[idx];
  liked[p.id] = !liked[p.id];
  localStorage.setItem('xos_liked_v2', JSON.stringify(liked));
  document.getElementById(`like-icon-${idx}`).classList.toggle('liked', liked[p.id]);
  document.getElementById(`like-count-${idx}`).textContent = fmt(p.likes+(liked[p.id]?1:0));
  if (liked[p.id]) sendTg(p.id);
}
function triggerDtap(el) {
  const h = el.querySelector('.dtap-heart i');
  h.classList.remove('pop'); void h.offsetWidth; h.classList.add('pop');
}
function fmt(n) { return n>=1000?(n/1000).toFixed(1)+'k':n; }
function handleShare() { if(navigator.share) navigator.share({title:'ZYNX',url:window.location.href}); }

// Push a history entry so back button works
history.pushState({ zynx: true }, '', '');
window.addEventListener('popstate', () => { window.close(); history.back(); });

// Autoplay: user already interacted via ZYNX button tap — start unmuted
muted = false;

loadPosts();
</script>
</body>
</html>
